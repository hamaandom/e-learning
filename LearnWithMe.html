window.submitProof=function(){
  const name=document.getElementById("sp-name").value.trim();
  const email=document.getElementById("sp-email").value.trim();
  const item=document.getElementById("sp-item").value;
  const amount=parseFloat(document.getElementById("sp-amount").value)||0;
  const method=document.getElementById("sp-method").value;
  const ref=document.getElementById("sp-ref").value.trim();
  const fileInput=document.getElementById("sp-file");
  if(!name||!item||!amount){toast("Name, item and amount are required","error");return;}
  const file=fileInput&&fileInput.files[0];
  function doSave(proofData){
    // Resolve item name
    let itemName=item;
    if(item.startsWith("PKG:")){const pk=(STATE.data.packages||[]).find(x=>x.id===item.slice(4));if(pk)itemName=pk.name;}
    else if(item.startsWith("CRS:")){const c=(STATE.data.courses||[]).find(x=>x.id===item.slice(4));if(c)itemName=c.title;}
    const submission={id:uid(),studentName:name,studentEmail:email,itemRef:item,itemName,amount,method,reference:ref,proofFile:proofData||"",status:"Pending",submittedAt:new Date().toISOString()};
    update(d=>{
      if(!d.proofSubmissions)d.proofSubmissions=[];
      d.proofSubmissions.unshift(submission);
      logActivity(d,`Proof of payment submitted by <b>${esc(name)}</b> for <b>${esc(itemName)}</b>`,COLORS.gold);
    });
    toast("Proof submitted! The admin will review and approve your payment.","success");
    // Clear form
    ["sp-name","sp-email","sp-amount","sp-ref"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    const si=document.getElementById("sp-item");if(si)si.value="";
    if(fileInput)fileInput.value="";
  }
  if(file){
    // Warn if file is large — localStorage has ~5MB limit shared across all data
    if(file.size > 500000) {
      toast("Warning: large file ("+Math.round(file.size/1024)+"KB) — images over 500KB may fill storage. Consider compressing first.","info");
    }
    const reader=new FileReader();
    reader.onload=ev=>doSave(ev.target.result);
    reader.readAsDataURL(file);
  } else doSave("");
};

window.viewSubmittedProof=function(id){
  const pr=(STATE.data.proofSubmissions||[]).find(x=>x.id===id);
  if(!pr)return;
  openModal("Proof of Payment",`
    <p style="color:#5a7a9f;font-size:13px;margin-bottom:14px"><b style="color:#dce8f5">${esc(pr.studentName)}</b> — ${esc(pr.itemName)}</p>
    ${pr.proofFile?`<img src="${pr.proofFile}" style="max-width:100%;border-radius:8px;border:1px solid #1e2f4a" onerror="this.style.display='none'" />`:"<div style='color:#5a7a9f'>No image attached</div>"}
    <div style="margin-top:14px;background:#141f33;border-radius:8px;padding:14px;font-size:13px;line-height:1.8">
      <div>Amount: <b style="color:${COLORS.emerald}">${fmtMoney(pr.amount)}</b></div>
      <div>Method: ${esc(pr.method)}</div>
      <div>Reference: <span style="font-family:'DM Mono',monospace">${esc(pr.reference||"—")}</span></div>
      <div>Email: ${esc(pr.studentEmail||"—")}</div>
    </div>
    <div class="flex-end" style="margin-top:16px">
      ${(STATE.userRole==="superadmin"||STATE.userRole==="admin")&&pr.status==="Pending"?`
        <button class="btn btn-emerald" onclick="closeModal();approveProof('${id}')">✓ Approve</button>
        <button class="btn btn-rose" onclick="closeModal();rejectProof('${id}')">✕ Reject</button>`:""}
      <button class="btn btn-surface" onclick="closeModal()">Close</button>
    </div>`,560);
};

window.approveProof=function(id){
  const pr=(STATE.data.proofSubmissions||[]).find(x=>x.id===id);
  if(!pr)return;
  if(!confirm(`Approve payment from ${pr.studentName} for ${pr.itemName}?\nThis creates a payment record and auto-enrolls them.`))return;
  update(d=>{
    // Mark proof approved
    const i=(d.proofSubmissions||[]).findIndex(x=>x.id===id);
    if(i>=0)d.proofSubmissions[i].status="Approved";
    // Create payment record
    if(!d.payments)d.payments=[];
    const payId=uid();
    d.payments.push({id:payId,user:pr.studentName,course:pr.itemName,amount:pr.amount,method:pr.method,reference:pr.reference,status:"Completed",date:today(),createdAt:new Date().toISOString(),proofId:id});
    // Auto-enroll
    if(!d.enrollments)d.enrollments=[];
    const alreadyEnrolled=(d.enrollments||[]).find(e=>e.user===pr.studentName&&e.course===pr.itemName);
    if(!alreadyEnrolled) d.enrollments.push({id:uid(),user:pr.studentName,course:pr.itemName,status:"Active",progress:0,enrolledDate:today(),createdAt:new Date().toISOString(),paymentId:payId});
    logActivity(d,`Proof approved — <b>${esc(pr.studentName)}</b> enrolled in <b>${esc(pr.itemName)}</b>`,COLORS.emerald);
  });
  sendReceiptEmailForProof(pr);
  toast("Approved! Student enrolled. Receipt email triggered.","success");
};

window.rejectProof=function(id){
  const reason=prompt("Reason for rejection (shown to student):");
  if(reason===null)return;
  update(d=>{
    const i=(d.proofSubmissions||[]).findIndex(x=>x.id===id);
    if(i>=0){d.proofSubmissions[i].status="Rejected";d.proofSubmissions[i].rejectionReason=reason;}
    logActivity(d,"Proof of payment rejected",COLORS.rose);
  });
  toast("Submission rejected","error");
};

// ECZ Grade 12 grading: 1-9 scale (1=highest, 9=fail/absent)
function eczGrade(pct){
  if(pct>=80) return {grade:"1",label:"Distinction",cls:"grade-A"};
  if(pct>=70) return {grade:"2",label:"Merit",cls:"grade-A"};
  if(pct>=60) return {grade:"3",label:"Credit",cls:"grade-B"};
  if(pct>=50) return {grade:"4",label:"Credit",cls:"grade-B"};
  if(pct>=45) return {grade:"5",label:"Credit",cls:"grade-C"};
  if(pct>=40) return {grade:"6",label:"Pass",cls:"grade-C"};
  if(pct>=35) return {grade:"7",label:"Pass",cls:"grade-D"};
  if(pct>=30) return {grade:"8",label:"Fail",cls:"grade-E"};
  return {grade:"9",label:"Fail",cls:"grade-U"};
}

window.saveContentItem = function(editing, type){
  const title=document.getElementById("cf-title").value.trim();
  if(!title){toast("Title is required","error");return;}
  const linkEl=document.getElementById("cf-link");
  const dueEl=document.getElementById("cf-due");
  const marksEl=document.getElementById("cf-marks");
  const fileInput=document.getElementById("cf-file");
  const cwEl=document.getElementById("cf-cwmarks");
  const isCW=type==="coursework";
  // Parse "StudentName: marks" lines into array
  let studentMarks=[];
  if(isCW&&cwEl){
    const maxM=marksEl?parseInt(marksEl.value)||100:100;
    cwEl.value.split("\n").forEach(line=>{
      const parts=line.split(":");
      if(parts.length>=2){
        const name=parts[0].trim();
        const raw=parseFloat(parts.slice(1).join(":").trim());
        if(name&&!isNaN(raw)) studentMarks.push({name,raw,pct:Math.round(raw/maxM*100)});
      }
    });
  }
  const descEl=document.getElementById("cf-desc");
  const contentEl=document.getElementById("cf-content");
  const form={title,type,
    subject:document.getElementById("cf-subject").value.trim(),
    status:document.getElementById("cf-status").value,
    description:descEl?descEl.value.trim():"",
    content:contentEl?contentEl.value.trim():"",
    link:linkEl?linkEl.value.trim():"",
    dueDate:dueEl?dueEl.value:"",
    marks:marksEl?parseInt(marksEl.value)||0:0,
    studentMarks: isCW?studentMarks:[],
    instructor:STATE.adminUser,
  };
  function doSave(fileData, fileName, fileType){
    if(fileData){ form.attachmentData=fileData; form.attachmentName=fileName; form.attachmentType=fileType; }
    update(d=>{
      if(!d.content)d.content=[];
      if(editing){const i=d.content.findIndex(c=>c.id===editing);if(i>=0)d.content[i]={...d.content[i],...form};logActivity(d,`${type} <b>${esc(title)}</b> updated`,COLORS.gold);}
      else{d.content.push({id:uid(),...form,createdAt:new Date().toISOString()});logActivity(d,`${type} <b>${esc(title)}</b> posted`,TYPE_COLOR[type]||COLORS.gold);}
    });
    closeModal(); toast(type.charAt(0).toUpperCase()+type.slice(1)+" posted!","success");
  }
  const file = fileInput&&fileInput.files[0];
  if(file){
    if(file.size>3000000){toast("File too large — please keep files under 3MB","error");return;}
    const btn=document.getElementById("cf-post-btn"); if(btn){btn.disabled=true;btn.textContent="Uploading…";}
    const reader=new FileReader();
    reader.onload=ev=>doSave(ev.target.result, file.name, file.type);
    reader.readAsDataURL(file);
  } else doSave(null,null,null);
};

   MY LEARNING — Student tabbed hub

let _learningTab = "courses";

function renderMyLearning() {
  const now = new Date();
  const allContent = (STATE.data.content||[]).filter(c=>c.status==="Published");
  const enrollments = (STATE.data.enrollments||[]).filter(e=>e.user===STATE.adminUser);
  const tab = _learningTab;

  const STUDENT_TABS = [
    {id:"courses",      icon:"📚", label:"My Courses"},
    {id:"lesson",       icon:"🎬", label:"Lessons"},
    {id:"note",         icon:"📝", label:"Notes"},
    {id:"video",        icon:"🎥", label:"Videos"},
    {id:"audio",        icon:"🎵", label:"Audio"},
    {id:"announcement", icon:"📢", label:"Announcements"},
    {id:"assignment",   icon:"📋", label:"Assignments"},
    {id:"coursework",   icon:"📊", label:"Coursework"},
  ];

  const tabs = STUDENT_TABS.map(t=>`
    <button class="tab-btn${tab===t.id?" active":""}" onclick="switchLearningTab('${t.id}')">
      ${t.icon} ${t.label}${t.id!=="courses"?` <span style="opacity:.6;font-size:11px">(${allContent.filter(c=>c.type===t.id).length})</span>`:""}
    </button>`).join("");

  let body = "";
  if(tab==="courses"){
    const allCourses=(STATE.data.courses||[]).filter(c=>c.status==="Published");
    const myEnrolledIds=new Set(enrollments.map(e=>e.course));
    const availableCourses=allCourses.filter(c=>!myEnrolledIds.has(c.title)&&!myEnrolledIds.has(c.id));
    const enrolledCards=enrollments.map(e=>{
      const prog=e.progress||0;
      return `<div class="content-card" style="cursor:default">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="width:44px;height:44px;border-radius:10px;background:#1a273d;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📖</div>
          <div style="flex:1;min-width:140px">
            <div style="font-weight:700;font-size:14px">${esc(e.course)}</div>
            <div style="font-size:11px;color:#5a7a9f;margin-top:2px">Enrolled ${esc(e.enrolledDate||"")}</div>
            <div style="margin-top:8px">
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:#5a7a9f">Progress</span><b style="color:${prog>=100?COLORS.emerald:COLORS.accent}">${prog}%</b></div>
              <div class="prog-track" style="width:100%"><div class="prog-fill" style="width:${prog}%;background:${prog>=100?COLORS.emerald:COLORS.accent}"></div></div>
            </div>
          </div>
          ${chipHTML(e.status||"Active")}
        </div>
      </div>`;
    }).join("");
    const pickCards=!availableCourses.length?"":`
      <div style="margin-top:24px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#5a7a9f;margin-bottom:12px">Available Courses — Request Enrolment</div>
        ${availableCourses.map(c=>`
          <div class="content-card">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="content-icon ctype-lesson">📚</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13.5px">${esc(c.title)}</div>
                <div style="font-size:11px;color:#5a7a9f;margin-top:2px">${esc(c.category)} · ${esc(c.level||"—")} · ${c.price>0?fmtMoney(c.price):"Free"}</div>
                ${c.description?`<div style="font-size:12px;color:#5a7a9f;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.description)}</div>`:""}
              </div>
              <button class="btn btn-sm btn-emerald" onclick="studentRequestEnrol('${c.id}')">+ Enrol</button>
            </div>
          </div>`).join("")}
      </div>`;
    body = (enrollments.length?enrolledCards:emptyState("📚","You are not enrolled in any courses yet"))+pickCards;
  } else if(tab==="assignment"){
    const items=allContent.filter(c=>c.type==="assignment").sort((a,b)=>(!a.dueDate?1:!b.dueDate?-1:new Date(a.dueDate)-new Date(b.dueDate)));
    body = !items.length ? emptyState("📋","No assignments posted yet") : items.map(c=>{
      let dueBadge="";
      if(c.dueDate){const d=new Date(c.dueDate);const diff=Math.ceil((d-now)/86400000);
        if(diff<0) dueBadge=`<span class="due-badge due-overdue">OVERDUE</span>`;
        else if(diff===0) dueBadge=`<span class="due-badge due-soon">Due TODAY</span>`;
        else if(diff<=3) dueBadge=`<span class="due-badge due-soon">Due in ${diff}d</span>`;
        else dueBadge=`<span class="due-badge due-ok">Due ${esc(c.dueDate)}</span>`;
      }
      return `<div class="content-card" onclick="viewContentItem('${c.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="content-icon ctype-assign">📋</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-weight:700;font-size:13.5px">${esc(c.title)}</span>${dueBadge}</div>
            <div style="font-size:11px;color:#5a7a9f;margin-top:3px">${esc(c.subject||"—")} · By ${esc(c.instructor)}</div>
            ${c.marks?`<div style="font-size:11px;color:#5a7a9f;margin-top:2px">Max marks: <b style="color:#dce8f5">${c.marks}</b></div>`:""}
          </div>
          <span style="color:#3d8ef0;font-size:20px;flex-shrink:0">›</span>
        </div>
      </div>`;
    }).join("");
  } else if(tab==="announcement"){
    const items=allContent.filter(c=>c.type==="announcement").slice().reverse();
    body = !items.length ? emptyState("📢","No announcements yet") : items.map(c=>`
      <div class="announce-card" onclick="viewContentItem('${c.id}')" style="cursor:pointer">
        <div style="font-weight:700;font-size:13.5px;margin-bottom:5px">${esc(c.title)}</div>
        <div style="font-size:12.5px;color:#a0b8d8;line-height:1.7">${esc((c.description||c.content||"").slice(0,200))}${(c.description||c.content||"").length>200?"…":""}</div>
        <div style="font-size:10px;color:#5a7a9f;margin-top:8px">By ${esc(c.instructor)} · ${esc(c.createdAt?c.createdAt.slice(0,10):"")}</div>
      </div>`).join("");
  } else if(tab==="coursework"){
    // Students only see coursework entries where their name appears
    const cwItems=allContent.filter(c=>c.type==="coursework");
    const myCW=cwItems.filter(c=>(c.studentMarks||[]).some(m=>m.name.toLowerCase()===STATE.adminUser.toLowerCase()));
    body = !myCW.length ? emptyState("📊","No coursework results have been posted for you yet") : myCW.map(c=>{
      const myEntry=(c.studentMarks||[]).find(m=>m.name.toLowerCase()===STATE.adminUser.toLowerCase());
      const g=myEntry?eczGrade(myEntry.pct):{grade:"?",label:"—",cls:"grade-U"};
      return `<div class="result-card" onclick="viewContentItem('${c.id}')" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="grade-badge ${g.cls}" style="font-size:28px;min-width:42px">${g.grade}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:13.5px">${esc(c.title)}</div>
            <div style="font-size:11px;color:#5a7a9f;margin-top:2px">${esc(c.subject||"—")} · By ${esc(c.instructor)}</div>
            ${myEntry?`<div style="margin-top:6px">
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#5a7a9f">${myEntry.raw}/${c.marks||100} marks (${myEntry.pct}%)</span><span class="${g.cls}">${g.label}</span></div>
              <div class="mark-bar-track"><div class="mark-bar-fill" style="width:${myEntry.pct}%;background:${myEntry.pct>=60?"#3de0a0":myEntry.pct>=40?"#f0c93d":"#f05a5a"}"></div></div>
            </div>`:""}
          </div>
          <span style="color:#3d8ef0;font-size:20px;flex-shrink:0">›</span>
        </div>
      </div>`;
    }).join("");
  } else {
    const items=allContent.filter(c=>c.type===tab).slice().reverse();
    body = !items.length ? emptyState(TYPE_ICON[tab]||"📄","No "+tab+"s posted yet") : items.map(c=>`
      <div class="content-card" onclick="viewContentItem('${c.id}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="content-icon ${TYPE_BG[c.type]||"ctype-lesson"}">${TYPE_ICON[c.type]||"📄"}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:13.5px">${esc(c.title)}</div>
            <div style="font-size:11px;color:#5a7a9f;margin-top:3px">${esc(c.subject||"—")} · By ${esc(c.instructor)} · ${esc(c.createdAt?c.createdAt.slice(0,10):"")}</div>
            ${c.description?`<div style="font-size:12px;color:#5a7a9f;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.description)}</div>`:""}
          </div>
          <span style="color:#3d8ef0;font-size:20px;flex-shrink:0">›</span>
        </div>
      </div>`).join("");
  }

  return `<div>
    <div class="page-header"><h1 class="page-title">My Learning</h1><div class="page-desc">All your courses, lessons, and class content</div></div>
    <div class="tab-bar">${tabs}</div>
    ${body}
  </div>`;
}

window.switchLearningTab = function(tab){ _learningTab=tab; document.getElementById("page-main").innerHTML=renderMyLearning(); bindPage("mylearning"); };

window.studentRequestEnrol = function(courseId){
  const c=(STATE.data.courses||[]).find(x=>x.id===courseId); if(!c)return;
  const already=(STATE.data.enrollments||[]).find(e=>e.user===STATE.adminUser&&(e.course===c.title||e.course===courseId));
  if(already){toast("You are already enrolled in this course","info");return;}
  if(c.price>0){
    if(!confirm(`Enrol in "${c.title}" (${fmtMoney(c.price)})?

You will be enrolled immediately. If payment is required, please submit proof of payment in the Proof of Payment section.`))return;
  } else {
    if(!confirm(`Enrol in "${c.title}" (Free)?
You will be enrolled immediately.`))return;
  }
  update(d=>{
    if(!d.enrollments)d.enrollments=[];
    d.enrollments.push({id:uid(),user:STATE.adminUser,course:c.title,status:"Active",progress:0,enrolledDate:today(),createdAt:new Date().toISOString()});
    logActivity(d,`<b>${esc(STATE.adminUser)}</b> self-enrolled in <b>${esc(c.title)}</b>`,COLORS.emerald);
  });
  toast(`Enrolled in ${c.title}!`,"success");
  document.getElementById("page-main").innerHTML=renderMyLearning(); bindPage("mylearning");
};

function renderMyResults(){

    const m=(c.studentMarks||[]).find(x=>x.name.toLowerCase()===STATE.adminUser.toLowerCase());

              <span class="${g.cls} font-weight:700">${g.label}</span>
            </div>
            <div class="mark-bar-track"><div class="mark-bar-fill" style="width:${m.pct}%;background:${m.pct>=60?"#3de0a0":m.pct>=40?"#f0c93d":"#f05a5a"}"></div></div>
          </div>`:""}
        </div>
      </div>
    </div>`;
  }).join("");

  const progressCards=!enrollments.length?emptyState("📚","Not enrolled in any courses"):enrollments.map(e=>{
    const prog=e.progress||0; const g=eczGrade(prog);
    return `<div class="result-card">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:42px;height:42px;border-radius:10px;background:#1a273d;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📖</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13.5px">${esc(e.course)}</div>
          <div style="font-size:11px;color:#5a7a9f;margin-top:2px">Enrolled ${esc(e.enrolledDate||"—")}</div>
          <div style="margin-top:6px">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#5a7a9f">Completion</span><b style="color:${prog>=100?COLORS.emerald:COLORS.accent}">${prog}%</b></div>
            <div class="mark-bar-track"><div class="mark-bar-fill" style="width:${prog}%;background:${prog>=100?COLORS.emerald:COLORS.accent}"></div></div>
          </div>
        </div>
        ${chipHTML(e.status||"Active")}
      </div>

      <div style="display:flex;align-items:center;gap:12px">

      </div>

  }).join("");

  return `<div>
    <div class="page-header"><h1 class="page-title">My Results</h1><div class="page-desc">Your academic performance, course progress and assignments</div></div>

    <div class="stat-grid">
      ${statCard("Overall Average",totalCW?(avgPct+"%"):"—","🏆",totalCW?COLORS.emerald:COLORS.muted,"Based on coursework")}

        <div style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#5a7a9f;margin-bottom:12px">📊 Coursework Results</div>

    </div>
  </div>`;
}

window.togglePwEye = function(inputId,btn){
  const inp=document.getElementById(inputId); if(!inp)return;
  inp.type=inp.type==="password"?"text":"password";
  btn.textContent=inp.type==="password"?"👁":"🔒";
};

window.toggleSuspendUser = function(id){
  const u=(STATE.data.users||[]).find(x=>x.id===id); if(!u)return;
  const isSuspended=u.status==="Suspended";
  const newStatus=isSuspended?"Active":"Suspended";
  let reason="";
  if(!isSuspended){reason=prompt(`Reason for suspending ${u.name} (shown in logs):`);if(reason===null)return;}
  if(!confirm(`${isSuspended?"Reinstate":"Suspend"} account for "${u.name}"?`))return;
  update(d=>{
    const i=d.users.findIndex(x=>x.id===id);
    if(i>=0){d.users[i].status=newStatus;if(reason)d.users[i].suspensionReason=reason;}

window.approveSignup = function(reqId){
  const r=(STATE.data.signupRequests||[]).find(x=>x.id===reqId); if(!r)return;
  // Pick role for approved user — default Student; could be extended
  const role="Student";
  if(!confirm(`Approve application for "${r.name}" and create their account?`))return;
  update(d=>{
    // Create the user account
    if(!d.users)d.users=[];
    const existingUser=d.users.find(u=>u.email===r.email);
    if(!existingUser){
      const courses=d.courses||[]; const packages=d.packages||[];
      // Resolve applied-for names for display
      const appliedNames=(r.appliedFor||[]).map(ref=>{
        if(ref.startsWith("CRS:")){const c=courses.find(x=>x.id===ref.slice(4));return c?c.title:"";}
        if(ref.startsWith("PKG:")){const p=packages.find(x=>x.id===ref.slice(4));return p?p.name:"";}
        return "";
      }).filter(Boolean);
      const newUser={
        id:uid(), name:r.name, email:r.email, phone:r.phone||"",
        nrc:r.nrc||"", role, status:"Active", password:r.password,
        notes:`NRC: ${r.nrc||"—"}. Applied for: ${appliedNames.join(", ")||"N/A"}`,
        joined:today(), createdAt:new Date().toISOString(), signupRequestId:reqId
      };
      d.users.push(newUser);
      // Auto-enroll in applied-for courses/packages
      if(!d.enrollments)d.enrollments=[];
      (r.appliedFor||[]).forEach(ref=>{
        let courseName="";
        if(ref.startsWith("CRS:")){const c=(d.courses||[]).find(x=>x.id===ref.slice(4));if(c)courseName=c.title;}
        else if(ref.startsWith("PKG:")){const p=(d.packages||[]).find(x=>x.id===ref.slice(4));if(p)courseName=p.name;}
        if(courseName){
          const already=d.enrollments.find(e=>e.user===r.name&&e.course===courseName);
          if(!already)d.enrollments.push({id:uid(),user:r.name,course:courseName,status:"Active",progress:0,enrolledDate:today(),createdAt:new Date().toISOString()});
        }
      });
    }
    // Mark request approved
    const ri=(d.signupRequests||[]).findIndex(x=>x.id===reqId);
    if(ri>=0){d.signupRequests[ri].status="Approved";d.signupRequests[ri].resolvedBy=STATE.adminUser;d.signupRequests[ri].resolvedAt=new Date().toISOString();}
    logActivity(d,`Sign-up application approved for <b>${esc(r.name)}</b> by <b>${esc(STATE.adminUser)}</b>`,COLORS.emerald);
  });
  toast(`${r.name}'s account has been created and activated!`,"success");
};

window.denySignup = function(reqId){
  const r=(STATE.data.signupRequests||[]).find(x=>x.id===reqId); if(!r)return;
  const reason=prompt(`Reason for denying ${r.name}'s application (optional):`); if(reason===null)return;
  update(d=>{
    const ri=(d.signupRequests||[]).findIndex(x=>x.id===reqId);
    if(ri>=0){d.signupRequests[ri].status="Denied";d.signupRequests[ri].denyReason=reason||"";d.signupRequests[ri].resolvedBy=STATE.adminUser;d.signupRequests[ri].resolvedAt=new Date().toISOString();}
    logActivity(d,`Sign-up application denied for <b>${esc(r.name)}</b> by <b>${esc(STATE.adminUser)}</b>`,COLORS.rose);
  });
  toast("Application denied.","error");
};

function renderLive() {
  const sessions = STATE.data.liveSessions || [];

  const courses = STATE.data.courses || [];
  const isInstructor = STATE.userRole === "instructor";
  const isStudent = STATE.userRole === "student";
  const isAdmin = STATE.userRole === "superadmin" || STATE.userRole === "admin";

  const visibleSessions = isInstructor
    ? sessions.filter(s => s.instructorName === STATE.adminUser)
    : isStudent
    ? sessions.filter(s => {
        // Student sees sessions only for courses they're enrolled in
        const enrolled = enrollments.filter(e => e.user === STATE.adminUser).map(e => e.course);

    : sessions; // admins see all

// Countdown helper
function getCountdown(targetDate) {
  const diff = targetDate - new Date();
  if(diff <= 0) return "Starting now";
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if(h>24) return `In ${Math.floor(h/24)}d`;
  if(h>0)  return `In ${h}h ${m}m`;
  return `In ${m} min`;
}

  });
},30000);

// Call Firebase Functions backend
// ── In-browser JWT signature — no server, no backend, pure Web Crypto ──
async function generateZoomSignature(meetingNumber, role) {
  const zc = STATE.data.settings?.zoomConfig||{};
  if(!zc.sdkKey||!zc.sdkSecret) throw new Error("Zoom SDK Key and Secret not configured in Settings");
  const iat = Math.floor(Date.now()/1000);
  const exp = iat + 7200;
  const b64u = s => btoa(s).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
  const header  = b64u(JSON.stringify({alg:"HS256",typ:"JWT"}));
  const payload = b64u(JSON.stringify({appKey:zc.sdkKey,sdkKey:zc.sdkKey,mn:String(meetingNumber),role,iat,exp,tokenExp:exp}));
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw",enc.encode(zc.sdkSecret),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  const sig = await crypto.subtle.sign("HMAC",key,enc.encode(header+"."+payload));
  const sigB64u = b64u(String.fromCharCode(...new Uint8Array(sig)));
  return {signature:`${header}.${payload}.${sigB64u}`, sdkKey:zc.sdkKey};
}

// Script loader
function loadScript(url) {
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${url}"]`)){ resolve(); return; }
    const s=document.createElement("script"); s.src=url;
    s.onload=resolve; s.onerror=()=>reject(new Error("Could not load: "+url));
    document.head.appendChild(s);
  });
}

// ── Core: launch Zoom Meeting SDK embedded (Component View) ──
async function launchZoomSDK(sessionId, meetingNumber, passcode, role) {
  if(!meetingNumber){ toast("No Meeting ID for this session","error"); return; }
  const wrap=document.getElementById("zoom-embed-wrap");
  const titleEl=document.getElementById("zoom-session-title");
  const s=(STATE.data.liveSessions||[]).find(x=>x.id===sessionId)||{};
  if(titleEl) titleEl.textContent=(s.title||"")+" — "+(s.courseName||"");
  wrap.classList.add("open");
  const root=document.getElementById("zmmtg-root");
  if(!document.getElementById("_zoom_spin")){
    const st=document.createElement("style"); st.id="_zoom_spin";
    st.textContent="@keyframes _zspin{to{transform:rotate(360deg)}}";
    document.head.appendChild(st);
  }
  root.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#080d17;color:#5a7a9f;gap:16px;font-family:'DM Sans',sans-serif">
    <div style="width:44px;height:44px;border:3px solid #3d8ef0;border-top-color:transparent;border-radius:50%;animation:_zspin .8s linear infinite"></div>
    <div style="font-size:15px">Connecting to Zoom…</div></div>`;
  try {
    const sigData = await generateZoomSignature(meetingNumber, role);
    if(!window.ZoomMtgEmbedded){
      await loadScript("https://source.zoom.us/2.18.2/zoom-meeting-embedded-2.18.2.min.js");
    }
    const client=window.ZoomMtgEmbedded.createClient();
    const W=root.clientWidth||window.innerWidth;
    const H=Math.max(root.clientHeight||window.innerHeight,500);
    client.init({debug:false,zoomAppRoot:root,language:"en-US",
      customize:{video:{isResizable:true,viewSizes:{default:{width:W,height:H}}}}});
    const userObj=(STATE.data.users||[]).find(u=>u.name===STATE.adminUser)||{};
    await client.join({
      signature:sigData.signature, sdkKey:sigData.sdkKey,
      meetingNumber:String(meetingNumber).replace(/\s/g,""),
      password:passcode||"",
      userName:STATE.adminUser||"User",
      userEmail:userObj.email||"",
      tk:"", zak:""
    });
    window._zoomClient=client;
  } catch(e) {
    console.error("[Zoom]",e);
    root.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#080d17;color:#dce8f5;text-align:center;padding:30px;gap:16px;font-family:'DM Sans',sans-serif">
      <div style="font-size:40px">⚠️</div>
      <div style="font-size:18px;font-weight:700">Could not join session</div>
      <div style="font-size:13px;color:#5a7a9f;max-width:460px;line-height:1.8">${esc(e.message)}</div>
      <div style="background:#141f33;border-radius:10px;padding:14px;font-size:12px;color:#5a7a9f;max-width:460px;line-height:1.9;text-align:left">
        <b style="color:#f0c93d">Check:</b><br/>
        • SDK Key &amp; Secret are correct in Settings<br/>
        • Meeting ID is correct (numbers only, no spaces)<br/>
        • Your Zoom meeting is actually running<br/>
        • Meeting ID: <span style="font-family:'DM Mono',monospace;color:#3d8ef0">${esc(String(meetingNumber))}</span>
      </div>
      <button class="btn btn-surface" onclick="closeZoomSession()">✕ Close</button>
    </div>`;
  }
}

window.closeZoomSession = function() {
  try{ if(window._zoomClient){ window._zoomClient.leaveMeeting(); window._zoomClient=null; } }catch(e){}
  const wrap=document.getElementById("zoom-embed-wrap");

  const root=document.getElementById("zmmtg-root");
  if(root) root.innerHTML="";

══════════════════════════════════════════════════════════ */

// 1. Global error boundary — only fires after app is fully initialised
let _appReady = false;
window.onerror = function(msg, src, line, col, err) {
  const safeMsg = String(msg||"Unknown error");
  console.error("[LWM Error]", safeMsg, src, line, col);
  // Ignore: external CDN errors, ResizeObserver noise, cross-origin script errors
  const ignore = !_appReady ||
    safeMsg.includes("Script error") ||
    safeMsg.includes("ResizeObserver") ||
    safeMsg.includes("emailjs") ||
    safeMsg.includes("zoom") ||
    (src && !src.includes(location.hostname) && !src.includes("blob:"));
  if(!ignore) showErrorOverlay("An unexpected error occurred: " + safeMsg.slice(0,120));
  return true;
};

// 2. Unhandled promise rejection handler
window.addEventListener("unhandledrejection", function(e) {
  const msg = e.reason?.message || String(e.reason) || "Promise rejected";
  console.error("[LWM UnhandledRejection]", msg);
  if(!msg.includes("zoom")&&!msg.includes("emailjs")&&msg!=="undefined") {
    toast("Background error: " + msg.slice(0,80), "error");
  }
  e.preventDefault();
});

function showErrorOverlay(msg) {
  const overlay = document.getElementById("error-overlay");
  const msgEl = document.getElementById("error-overlay-msg");
  if(overlay){ if(msgEl) msgEl.textContent = msg; overlay.classList.add("show"); }
}

// 3. Safe render — wraps navigate() to catch page-level crashes without touching render()
function safeNavigate(page) {
  try {
    navigate(page);
  } catch(e) {
    console.error("[LWM NavigateError]", e);
    try { STATE.page="dashboard"; render(); toast("Page error — returned to Dashboard","error"); }
    catch(e2){ showErrorOverlay("Critical render error. Your data is safe. Click Reload to restart."); }
  }
}

// 4. Debounce utility
function debounce(fn, ms=300) {
  let t; return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args),ms); };
}

// 5. Safe localStorage wrappers
function safeGet(key) { try{ return localStorage.getItem(key); }catch{ return null; } }
function safeSet(key, val) {
  try { localStorage.setItem(key,val); return true; }
  catch(e) { if(e.name==="QuotaExceededError"||e.code===22) toast("⚠️ Storage full! Export a backup.","error"); return false; }
}

// 6. Auto-save session state every 30 seconds (uses sessionStorage saveSession, not saveLiveSession)
setInterval(()=>{ try{ saveSession(); }catch{} }, 30000);

// 7. Retry utility
async function withRetry(fn, retries=3, delayMs=1000) {
  for(let i=0;i<retries;i++){
    try { return await fn(); }
    catch(e) {
      if(i===retries-1) throw e;
      await new Promise(r=>setTimeout(r,delayMs*(i+1)));
      toast(`Retrying… (attempt ${i+2}/${retries})`,"info");
    }
  }
}

// 8. Health check on load
(function healthCheck(){
  try {
    const used=JSON.stringify(STATE.data).length;
    if(used/1024 > 4500) toast(`⚠️ Storage is ${Math.round(used/1024)}KB — near limit. Export a backup.`,"error");
  } catch{}
})();

// 9. Lazy image loader
function lazyLoadImages() {
  document.querySelectorAll("img[data-src]").forEach(img=>{
    if(img.getBoundingClientRect().top < window.innerHeight+200){ img.src=img.dataset.src; img.removeAttribute("data-src"); }
  });
}
document.addEventListener("scroll",debounce(lazyLoadImages,100),{passive:true});

// 10. Connectivity monitor
window.addEventListener("online",  ()=>toast("✅ Connection restored","success"));
window.addEventListener("offline", ()=>toast("⚠️ You are offline. Changes save locally.","error"));
// Initialise EmailJS immediately if config is already saved
(function initEmailJS(){
  const ec=STATE.data.settings&&STATE.data.settings.emailConfig;
  if(ec&&ec.publicKey&&window.emailjs) emailjs.init({publicKey:ec.publicKey});
})();
render();
_appReady = true; // Only NOW does window.onerror show the overlay
</script>
