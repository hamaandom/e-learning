<style>

  #error-overlay{display:none;position:fixed;inset:0;background:#080d17;z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;font-family:'DM Sans',sans-serif;color:#dce8f5;text-align:center;padding:30px}

  #error-overlay .err-icon{font-size:52px}
  #error-overlay .err-title{font-size:22px;font-weight:700}
  #error-overlay .err-msg{font-size:14px;color:#5a7a9f;max-width:400px;line-height:1.6}
  #error-overlay .err-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  /* ── live badge ── */
  .live-badge{background:#f05a5a;color:#fff;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;letter-spacing:1px;animation:livePulse 1.4s ease-in-out infinite}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* ── session cards ── */

  .session-card.live-now{border-color:#f05a5a66;background:#1a0c0c}
  /* ── zoom embed ── */
  #zoom-embed-wrap{position:fixed;inset:0;background:#000;z-index:10000;display:none;flex-direction:column}
  #zoom-embed-wrap.open{display:flex}
  #zoom-embed-header{background:#0e1625;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2f4a;flex-shrink:0}
  #zoom-embed-frame{flex:1;width:100%;border:none}
  #zoom-embed-wrap #zmmtg-root{width:100%;height:100%;flex:1}

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080d17; color: #dce8f5; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #0e1625; }
  ::-webkit-scrollbar-thumb { background: #1e2f4a; border-radius: 3px; }
  input, select, textarea, button { font-family: inherit; }
  @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ── layout ── */
  #app { min-height: 100vh; }
  #main-layout { display: flex; flex-direction: column; height: 100vh; }
  #topnav { background:#0e1625; border-bottom:1px solid #1e2f4a; padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:100; }
  #body-wrap { display:flex; flex:1; overflow:hidden; }
  #sidebar { width:220px; background:#0e1625; border-right:1px solid #1e2f4a; flex-shrink:0; overflow-y:auto; padding:20px 10px; display:flex; flex-direction:column; gap:2px; }
  #page-main { flex:1; overflow-y:auto; padding:28px; }

  /* ── nav brand ── */
  .brand { font-family:'Playfair Display',serif; font-size:21px; font-weight:700; background:linear-gradient(135deg,#3d8ef0,#f0c93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .admin-badge { background:#3d8ef018; color:#3d8ef0; border:1px solid #3d8ef044; border-radius:20px; padding:2px 10px; font-size:10px; font-weight:700; letter-spacing:1.2px; }

  /* ── sidebar ── */
  .nav-section-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#5a7a9f; padding:14px 12px 6px; margin-top:8px; }
  .nav-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; font-size:13.5px; font-weight:500; cursor:pointer; border:none; width:100%; text-align:left; background:transparent; color:#5a7a9f; transition:background .15s,color .15s; }
  .nav-btn:hover { background:#3d8ef010; color:#3d8ef0; }
  .nav-btn.active { background:#3d8ef018; color:#3d8ef0; }
  .nav-btn .nav-icon { font-size:15px; width:20px; text-align:center; }

  /* ── card ── */
  .card { background:#0c1422; border:1px solid #1e2f4a; border-radius:14px; }
  .section-card { background:#0c1422; border:1px solid #1e2f4a; border-radius:14px; padding:22px; margin-bottom:20px; }
  .section-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .section-card-title { font-size:15px; font-weight:700; }

  /* ── inputs ── */
  .inp { background:#141f33; border:1px solid #1e2f4a; border-radius:8px; color:#dce8f5; padding:10px 14px; font-size:13.5px; width:100%; outline:none; transition:border-color .15s, box-shadow .15s; }
  .inp:focus { border-color:#3d8ef0; box-shadow:0 0 0 3px #3d8ef022; }
  select.inp { appearance:none; cursor:pointer; }
  textarea.inp { resize:vertical; }

  /* ── buttons ── */
  .btn { background:#3d8ef0; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:opacity .15s,transform .1s; }
  .btn:hover { opacity:.82; transform:translateY(-1px); }
  .btn:disabled { cursor:not-allowed; opacity:.5; }
  .btn-sm { padding:6px 13px; font-size:12px; }
  .btn-surface { background:#1a273d; color:#dce8f5; }
  .btn-rose { background:#f05a5a; }
  .btn-gold { background:#f0c93d; color:#080d17; }
  .btn-emerald { background:#3de0a0; color:#080d17; }

  /* ── label ── */
  .field-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#5a7a9f; display:block; margin-bottom:7px; }
  .field { margin-bottom:16px; }

  /* ── chip ── */
  .chip { border-radius:20px; padding:2px 10px; font-size:11px; font-weight:700; letter-spacing:.4px; white-space:nowrap; border:1px solid; }

  /* ── table ── */
  .tbl { width:100%; border-collapse:collapse; font-size:13.5px; }
  .tbl th { text-align:left; padding:10px 14px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#5a7a9f; border-bottom:1px solid #1e2f4a; white-space:nowrap; }
  .tbl td { padding:12px 14px; border-bottom:1px solid #1e2f4a22; vertical-align:middle; }
  .tbl tr:hover td { background:#3d8ef008; }
  .tbl-wrap { overflow-x:auto; }

  /* ── modal ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(4px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s; }
  .modal-box { background:#0e1625; border:1px solid #1e2f4a; border-radius:18px; padding:32px; max-height:90vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .modal-title { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; }
  .modal-close { background:none; border:none; color:#5a7a9f; cursor:pointer; font-size:20px; line-height:1; }

  /* ── toast ── */
  #toast-container { position:fixed; bottom:28px; right:28px; z-index:9999; pointer-events:none; }
  .toast { background:#0e1625; border:1px solid #1e2f4a44; border-radius:10px; padding:13px 18px; font-size:13px; color:#dce8f5; box-shadow:0 12px 40px rgba(0,0,0,.5); max-width:320px; animation:slideIn .25s ease; margin-top:8px; }

  /* ── stat card ── */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card { position:relative; overflow:hidden; padding:22px; transition:transform .2s,box-shadow .2s; cursor:default; }
  .stat-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .stat-card-glow { position:absolute; top:-30px; right:-30px; width:100px; height:100px; border-radius:50%; opacity:.12; filter:blur(20px); pointer-events:none; }
  .sparkle-ring { position:absolute; bottom:-15px; left:-15px; width:80px; height:80px; border-radius:50%; border:1px solid; opacity:.08; animation:pulse-glow 3s ease infinite; pointer-events:none; }
  .stat-icon { position:absolute; top:-10px; right:-10px; font-size:56px; opacity:.06; transition:opacity .2s,transform .2s; }
  .stat-card:hover .stat-icon { opacity:.13; transform:scale(1.1) rotate(5deg); }
  .stat-label { font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#5a7a9f; margin-bottom:10px; }
  .stat-value { font-family:'Playfair Display',serif; font-size:36px; font-weight:700; line-height:1; }
  .stat-value-anim { display:inline-block; animation:countUp .6s ease both; }
  .stat-sub { font-size:11px; color:#5a7a9f; margin-top:7px; }
  @keyframes countUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes pulse-glow { 0%,100%{opacity:.08} 50%{opacity:.18} }
  @keyframes float-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  /* ── dashboard welcome banner ── */
  .dash-welcome { position:relative; overflow:hidden; border-radius:16px; padding:28px 32px; margin-bottom:24px;
    background:linear-gradient(135deg,#0a1e3d 0%,#0d2040 50%,#091628 100%); border:1px solid #1e3a5f; }
  .dash-welcome::after { content:''; position:absolute; top:0; right:0; width:280px; height:100%;
    background:radial-gradient(ellipse at 80% 50%,#3d8ef018 0%,transparent 70%); pointer-events:none; }
  .dash-welcome-grid { position:absolute; inset:0; opacity:.03;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 30px,#3d8ef0 30px,#3d8ef0 31px),
    repeating-linear-gradient(90deg,transparent,transparent 30px,#3d8ef0 30px,#3d8ef0 31px); }
  .dash-greeting { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; margin-bottom:4px; }
  .dash-date { font-size:12px; color:#5a7a9f; letter-spacing:.5px; }
  .dash-orb { position:absolute; right:28px; top:50%; transform:translateY(-50%); width:80px; height:80px;
    border-radius:50%; background:radial-gradient(circle,#3d8ef033,transparent); border:1px solid #3d8ef033;
    display:flex; align-items:center; justify-content:center; font-size:34px; }
  /* ── tabs ── */
  .tab-bar { display:flex; gap:4px; flex-wrap:wrap; background:#0c1422; border:1px solid #1e2f4a; border-radius:12px; padding:5px; margin-bottom:22px; }
  .tab-btn { flex:1; min-width:80px; padding:9px 14px; border:none; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; background:transparent; color:#5a7a9f; transition:all .15s; white-space:nowrap; text-align:center; }
  .tab-btn.active { background:#3d8ef018; color:#3d8ef0; box-shadow:0 0 0 1px #3d8ef033; }
  .tab-btn:hover:not(.active) { background:#1a273d; color:#dce8f5; }
  /* ── content type icons ── */
  .ctype-lesson  { background:linear-gradient(135deg,#3d8ef022,#3d8ef044); color:#3d8ef0; }
  .ctype-note    { background:linear-gradient(135deg,#f0c93d22,#f0c93d44); color:#f0c93d; }
  .ctype-video   { background:linear-gradient(135deg,#f05a5a22,#f05a5a44); color:#f05a5a; }
  .ctype-audio   { background:linear-gradient(135deg,#3de0a022,#3de0a044); color:#3de0a0; }
  .ctype-announce{ background:linear-gradient(135deg,#c084fc22,#c084fc44); color:#c084fc; }
  .ctype-assign  { background:linear-gradient(135deg,#f07a3d22,#f07a3d44); color:#f07a3d; }
  /* ── content card ── */
  .content-card { border:1px solid #1e2f4a; border-radius:12px; padding:18px; margin-bottom:10px; background:#0c1422; transition:border-color .15s,transform .15s,box-shadow .15s; cursor:pointer; }
  .content-card:hover { border-color:#3d8ef033; transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .content-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  /* ── due date badge ── */
  .due-badge { font-size:10px; font-weight:700; letter-spacing:.6px; padding:3px 8px; border-radius:20px; white-space:nowrap; }
  .due-ok      { background:#3de0a022; color:#3de0a0; border:1px solid #3de0a044; }
  .due-soon    { background:#f0c93d22; color:#f0c93d; border:1px solid #f0c93d44; }
  .due-overdue { background:#f05a5a22; color:#f05a5a; border:1px solid #f05a5a44; }
  /* ── announcement banner ── */
  .announce-card { border-left:3px solid #c084fc; background:linear-gradient(135deg,#c084fc08,transparent); border-radius:0 10px 10px 0; padding:14px 16px; margin-bottom:10px; border-top:1px solid #1e2f4a22; border-right:1px solid #1e2f4a22; border-bottom:1px solid #1e2f4a22; }
  /* ── instructor quick actions ── */
  .instructor-quick-actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:22px; }
  .quick-action { border:1px solid #1e2f4a; border-radius:12px; padding:16px; text-align:center; cursor:pointer; background:#0c1422; transition:all .15s; }
  .quick-action:hover { border-color:#3d8ef044; background:#3d8ef008; transform:translateY(-2px); }
  .quick-action .qa-icon { font-size:26px; margin-bottom:8px; }
  .quick-action .qa-label { font-size:12px; font-weight:600; color:#dce8f5; }
  .quick-action .qa-sub { font-size:10px; color:#5a7a9f; margin-top:3px; }
  /* ── grades ── */
  .grade-A { color:#3de0a0; } .grade-B { color:#3d8ef0; } .grade-C { color:#f0c93d; }
  .grade-D { color:#f07a3d; } .grade-E { color:#f05a5a; } .grade-U { color:#5a7a9f; }
  .grade-badge { font-size:22px; font-weight:900; font-family:'Playfair Display',serif; min-width:36px; text-align:center; }
  .result-card { border:1px solid #1e2f4a; border-radius:12px; padding:16px 18px; margin-bottom:10px; background:#0c1422; }
  .mark-bar-wrap { margin-top:8px; }
  .mark-bar-track { height:6px; background:#1a273d; border-radius:3px; }
  .mark-bar-fill { height:100%; border-radius:3px; transition:width .6s; }

  /* ── page header ── */
  .page-header { margin-bottom:26px; }
  .page-title { font-family:'Playfair Display',serif; font-size:27px; font-weight:700; letter-spacing:-.5px; }
  .page-desc { font-size:13px; color:#5a7a9f; margin-top:5px; }

  /* ── empty state ── */
  .empty-state { text-align:center; padding:44px 20px; color:#5a7a9f; }
  .empty-icon { font-size:38px; margin-bottom:12px; }

  /* ── toggle ── */
  .toggle-wrap { width:44px; height:24px; border-radius:12px; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0; }
  .toggle-knob { position:absolute; top:3px; width:18px; height:18px; background:#fff; border-radius:50%; transition:left .2s; }

  /* ── search bar ── */
  .search-bar { width:220px; }

  /* ── progress bar ── */
  .prog-track { height:5px; background:#1a273d; border-radius:3px; width:100px; }
  .prog-fill { height:100%; border-radius:3px; transition:width .5s; }

  /* ── grid helpers ── */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .flex-end { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
  .flex-row { display:flex; gap:6px; }

  /* ── login ── */
  #login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background: radial-gradient(ellipse at 25% 20%, #0a1e3d 0%, #080d17 55%), radial-gradient(ellipse at 80% 80%, #0c1a30 0%, transparent 55%);
    position:relative; }
  .login-grid-bg { position:absolute; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,#3d8ef006 60px,#3d8ef006 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,#3d8ef006 60px,#3d8ef006 61px); pointer-events:none; }
  .login-box { position:relative; background:#0e1625; border:1px solid #1e2f4a; border-radius:20px; padding:40px 48px; width:min(480px, calc(100vw - 40px)); box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px #3d8ef018; }
  .login-brand { text-align:center; margin-bottom:28px; }
  .login-brand .big-brand { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; background:linear-gradient(135deg,#3d8ef0,#f0c93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-.5px; }
  .login-brand .sub { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#5a7a9f; margin-top:6px; }
  .role-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:28px; }
  .role-tab { background:#141f33; border:1px solid #1e2f4a; border-radius:10px; padding:10px 8px; cursor:pointer; text-align:center; transition:all .18s; }
  .role-tab:hover { border-color:#3d8ef0; background:#1a273d; }
  .role-tab.active { border-color:#3d8ef0; background:#3d8ef018; box-shadow:0 0 0 2px #3d8ef033; }
  .role-tab .rt-icon { font-size:20px; margin-bottom:4px; }
  .role-tab .rt-label { font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; }
  .role-tab.active .rt-label { color:#3d8ef0; }
  .login-btn { background:linear-gradient(135deg,#3d8ef0,#2a6bc2); color:#fff; border:none; border-radius:8px; width:100%; padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px; font-family:inherit; transition:opacity .15s; }
  .login-btn:hover { opacity:.88; }
  .login-err { background:#f05a5a18; border:1px solid #f05a5a44; color:#f05a5a; border-radius:8px; padding:11px 14px; font-size:13px; margin-top:14px; text-align:center; }
  .login-forgot { text-align:center; margin-top:12px; font-size:12px; color:#5a7a9f; }
  .login-forgot a { color:#3d8ef0; cursor:pointer; text-decoration:none; font-weight:600; }
  .login-forgot a:hover { text-decoration:underline; }
  .suspended-banner { background:#f05a5a12; border:1px solid #f05a5a44; border-radius:12px; padding:18px 20px; margin-bottom:20px; }
  .reset-request-card { border:1px solid #1e2f4a; border-radius:12px; padding:16px 18px; margin-bottom:10px; background:#0c1422; }
  .pw-eye-wrap { position:relative; }
  .pw-eye-wrap .inp { padding-right:40px; }
  .pw-eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#5a7a9f; cursor:pointer; font-size:16px; padding:0; line-height:1; }
  .login-hint { text-align:center; font-size:12px; color:#5a7a9f; margin-top:26px; line-height:1.8; background:#141f33; border-radius:8px; padding:12px 14px; border:1px solid #1e2f4a; }
  .login-mode-switch { display:flex; gap:0; background:#141f33; border:1px solid #1e2f4a; border-radius:10px; padding:4px; margin-bottom:22px; }
  .login-mode-btn { flex:1; padding:8px 12px; border:none; border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; background:transparent; color:#5a7a9f; transition:all .15s; font-family:inherit; }
  .login-mode-btn.active { background:#3d8ef0; color:#fff; }
  .signup-course-check { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid #1e2f4a; border-radius:8px; background:#141f33; margin-bottom:6px; cursor:pointer; transition:border-color .15s; }
  .signup-course-check:hover { border-color:#3d8ef033; }
  .signup-course-check input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:#3d8ef0; }
  .pending-signup-card { border:1px solid #1e2f4a; border-radius:12px; padding:16px 18px; margin-bottom:10px; background:#0c1422; }

  /* ── setting row ── */
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid #1e2f4a44; gap:16px; flex-wrap:wrap; }
  .setting-row-label { font-size:14px; font-weight:500; }
  .setting-row-desc { font-size:12px; color:#5a7a9f; margin-top:2px; }

  /* ── avatar ── */
  .avatar { border-radius:50%; background:linear-gradient(135deg,#3d8ef0,#f0c93d); display:flex; align-items:center; justify-content:center; font-weight:700; color:#080d17; flex-shrink:0; }

  /* ── analytics bar ── */
  .bar-wrap { margin-bottom:14px; }
  .bar-track { height:7px; background:#1a273d; border-radius:4px; }
  .bar-fill { height:100%; border-radius:4px; transition:width .7s; }

  /* ── storage status ── */
  .storage-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; margin-bottom:16px; }

<script>
/* ══════════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════════ */
const SUPER_ADMIN = { username: "superadmin", password: "LWM@Admin2026!" };
const STORAGE_KEY = "lwm_v2";
const SESSION_KEY = "lwm_session";

const COLORS = {
  bg:"#080d17", surface:"#0e1625", surface2:"#141f33", surface3:"#1a273d",
  border:"#1e2f4a", accent:"#3d8ef0", gold:"#f0c93d", emerald:"#3de0a0",
  rose:"#f05a5a", text:"#dce8f5", muted:"#5a7a9f", card:"#0c1422"
};

const CURRENCIES = {
  USD:{ symbol:"$", name:"US Dollar" },
  EUR:{ symbol:"€", name:"Euro" },
  GBP:{ symbol:"£", name:"British Pound" },
  ZMW:{ symbol:"K", name:"Zambian Kwacha" },
  NGN:{ symbol:"₦", name:"Nigerian Naira" },
  KES:{ symbol:"KSh", name:"Kenyan Shilling" },
  GHS:{ symbol:"₵", name:"Ghanaian Cedi" },
  ZAR:{ symbol:"R", name:"South African Rand" },
  INR:{ symbol:"₹", name:"Indian Rupee" },
  AUD:{ symbol:"A$", name:"Australian Dollar" },
  CAD:{ symbol:"C$", name:"Canadian Dollar" }
};

/* ══════════════════════════════════════════════════════════
   DATA & SESSION
══════════════════════════════════════════════════════════ */
function initialData() {
  return {
    users:[], courses:[], packages:[], payments:[], enrollments:[],
    proofSubmissions:[], academicPeriods:[], activity:[],
    passwordResets:[], signupRequests:[], liveSessions:[],
    settings:{
      platformName:"LearnWithMe", maintenance:false, freeEnrollments:true,
      emailNotifications:true, currency:"ZMW",
      merchant:{ airtelCode:"", zamtelCode:"", mtnCode:"", bankName:"", bankAccount:"", bankBranch:"" },
      emailConfig:{ publicKey:"", serviceId:"", templateId:"", fromName:"" },
      zoomConfig:{ sdkKey:"", sdkSecret:"" }
    }
  };
}
function loadData() {
  try {
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){
      const saved=JSON.parse(r);
      const base=initialData();
      return {
        ...base, ...saved,
        settings:{ ...base.settings, ...(saved.settings||{}),
          merchant:{ ...base.settings.merchant, ...((saved.settings||{}).merchant||{}) },
          emailConfig:{ ...base.settings.emailConfig, ...((saved.settings||{}).emailConfig||{}) },
          zoomConfig:{ ...base.settings.zoomConfig, ...((saved.settings||{}).zoomConfig||{}) },
        }
      };
    }
  } catch{}
  return initialData();
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE.data));
  } catch(e) {
    if(e.name==="QuotaExceededError"||e.code===22) {
      toast("⚠️ Storage full! Delete some proof images or export a backup to free space.","error");
    }
  }
}
function saveSession() {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ loggedIn:STATE.loggedIn, adminUser:STATE.adminUser, userRole:STATE.userRole, page:STATE.page })); } catch{}
}
function loadSession() {
  try { const s=sessionStorage.getItem(SESSION_KEY); if(s) return JSON.parse(s); } catch{}
  return null;
}

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let STATE = {
  loggedIn: false,
  adminUser: "",
  userRole: "",
  page: "dashboard",
  navHistory: [],
  data: loadData(),
};

// Restore session on refresh — sessionStorage clears when browser/tab closes
(function restoreSession(){
  const s = loadSession();
  if(s && s.loggedIn) {
    STATE.loggedIn = true;
    STATE.adminUser = s.adminUser || "";
    STATE.userRole  = s.userRole  || "";
    STATE.page      = s.page      || "dashboard";
  }
})();
function update(fn) {
  const next = JSON.parse(JSON.stringify(STATE.data));
  fn(next);
  STATE.data = next;
  saveData();
  render();
}
function navigate(page) {
  if(STATE.page && STATE.page !== page) STATE.navHistory.push(STATE.page);
  STATE.page = page; render();
}
function navigateBack() {
  if(STATE.navHistory.length) { STATE.page = STATE.navHistory.pop(); render(); }
}

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function uid() { return "_" + Math.random().toString(36).slice(2,10); }
function today() { return new Date().toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}); }
function getCurrencySymbol() {
  const cur = (STATE.data.settings && STATE.data.settings.currency) || "ZMW";
  return (CURRENCIES[cur] && CURRENCIES[cur].symbol) || cur;
}
function fmtMoney(n) { return getCurrencySymbol() + parseFloat(n||0).toFixed(2); }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return "just now"; if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
function esc(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }
function logActivity(d, msg, color) {
  if(!d.activity) d.activity=[];
  d.activity.unshift({msg, color:color||COLORS.accent, ts:new Date().toISOString()});
  if(d.activity.length>200) d.activity.length=200;
}

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
function toast(msg, type="info") {
  const colors={success:COLORS.emerald, error:COLORS.rose, info:COLORS.accent};
  const c = colors[type]||COLORS.accent;
  const el = document.createElement("div");
  el.className="toast";
  el.style.borderLeft=`3px solid ${c}`;
  el.style.border=`1px solid ${c}44`;
  el.style.borderLeft=`3px solid ${c}`;
  el.textContent=msg;
  const container=document.getElementById("toast-container");
  container.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); },3000);
}

/* ══════════════════════════════════════════════════════════
   CHIP
══════════════════════════════════════════════════════════ */
function chipHTML(label) {
  const map={
    Active:[COLORS.emerald,"#0d2e20"], Published:[COLORS.emerald,"#0d2e20"],
    Completed:[COLORS.emerald,"#0d2e20"], Approved:[COLORS.emerald,"#0d2e20"],
    Pending:[COLORS.gold,"#2a2000"], Draft:[COLORS.gold,"#2a2000"],
    Inactive:[COLORS.rose,"#2e0d0d"], Archived:[COLORS.muted,"#1a2236"],
    Failed:[COLORS.rose,"#2e0d0d"], Refunded:[COLORS.accent,"#0d1e33"],
    Suspended:[COLORS.rose,"#2e0d0d"],
    Student:[COLORS.accent,"#0d1e33"], Instructor:[COLORS.gold,"#2a2000"], Admin:[COLORS.rose,"#2e0d0d"],
    Free:[COLORS.emerald,"#0d2e20"],
    Programming:"#3d8ef0", Design:"#c084fc", Business:"#f0c93d", Marketing:"#f07a3d",
    Science:"#3de0a0", Language:"#e040fb", Music:"#f05a5a", Health:"#3df0b0", Other:"#5a7a9f"
  };
  let fg,bg;
  if(Array.isArray(map[label])){[fg,bg]=map[label];}
  else if(map[label]){fg=map[label];bg=map[label]+"22";}
  else{fg=COLORS.muted;bg=COLORS.surface2;}
  return `<span class="chip" style="color:${fg};background:${bg};border-color:${fg}33">${esc(label)}</span>`;
}

/* ══════════════════════════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════════════════════════ */
let _modalCloseHandler = null;
function openModal(title, bodyHTML, width=480) {
  closeModal();
  const overlay = document.createElement("div");
  overlay.className="modal-overlay";
  overlay.id="active-modal";
  overlay.innerHTML=`
    <div class="modal-box" style="width:min(${width}px, calc(100vw - 40px))">
      <div class="modal-header">
        <span class="modal-title">${esc(title)}</span>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div id="modal-body">${bodyHTML}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e=>{ if(e.target===overlay) closeModal(); });
  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
}
function closeModal() {
  const m=document.getElementById("active-modal");
  if(m) m.remove();
}
function modalBody() { return document.getElementById("modal-body"); }

/* ══════════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════════ */
function render() {
  saveSession();
  const app = document.getElementById("app");
  if(!STATE.loggedIn){ app.innerHTML=renderLogin(); bindLogin(); return; }
  app.innerHTML=renderShell();
  renderPage();
  bindNav();
  bindBottomNav();
}

/* ══════════════════════════════════════════════════════════
   LOGIN — 4 roles
══════════════════════════════════════════════════════════ */
let _loginRole = "superadmin"; // active tab

const ROLE_TABS = [
  { id:"superadmin", icon:"👑", label:"Super Admin" },
  { id:"admin",      icon:"🛡️", label:"Admin"       },
  { id:"instructor", icon:"🎓", label:"Instructor"   },
  { id:"student",    icon:"📖", label:"Student"      },
];

let _loginMode = "login"; // "login" | "signup"

function renderLogin() {
  const tabs = ROLE_TABS.map(r=>`
    <div class="role-tab${_loginRole===r.id?" active":""}" onclick="switchLoginRole('${r.id}')">
      <div class="rt-icon">${r.icon}</div>
      <div class="rt-label">${r.label}</div>
    </div>`).join("");

  if(_loginMode==="signup"){
    return renderSignupForm();
  }

  return `<div id="login-page">
    <div class="login-grid-bg"></div>
    <div class="login-box" id="login-box">
      <div class="login-brand">
        <div class="big-brand">LearnWithMe</div>
        <div class="sub">Learning Management System</div>
      </div>
      <div class="login-mode-switch">
        <button class="login-mode-btn active" onclick="_loginMode='login';render()">Sign In</button>
        <button class="login-mode-btn" onclick="_loginMode='signup';render()">Sign Up</button>
      </div>
      <div class="role-tabs">${tabs}</div>
      <div class="field"><label class="field-label">Username or Email</label><input class="inp" id="login-u" placeholder="Enter username or email" autocomplete="username" /></div>
      <div class="field"><label class="field-label">Password</label>
        <div class="pw-eye-wrap"><input class="inp" id="login-p" type="password" placeholder="••••••••••" autocomplete="current-password" /><button class="pw-eye-btn" type="button" onclick="togglePwEye('login-p',this)">👁</button></div>
      </div>
      <button class="login-btn" id="login-btn">Sign In</button>
      <div id="login-err" style="display:none" class="login-err">Invalid username or password</div>
      <div id="login-suspended" style="display:none" class="login-err">&#9888;&#65039; Your account has been suspended. Contact your administrator.</div>
      <div id="login-pending" style="display:none" class="login-err" style="background:#f0c93d18;border-color:#f0c93d44;color:#f0c93d">&#9203; Your account is awaiting approval. Please check back later.</div>
      <div class="login-forgot"><a onclick="showForgotPassword()">Forgot password?</a></div>
    </div>
  </div>`;
}

function renderSignupForm() {
  const courses=(STATE.data.courses||[]).filter(c=>c.status==="Published");
  const packages=(STATE.data.packages||[]);
  const courseChecks=!courses.length&&!packages.length
    ? `<div style="color:#5a7a9f;font-size:13px;padding:10px 0">No courses available yet. You can still register and select courses after approval.</div>`
    : [
        ...courses.map(c=>`<label class="signup-course-check"><input type="checkbox" name="su-course" value="CRS:${esc(c.id)}" /><div><div style="font-weight:600;font-size:13px">${esc(c.title)}</div><div style="font-size:11px;color:#5a7a9f">${c.price>0?fmtMoney(c.price):"Free"} · ${esc(c.category)}</div></div></label>`),
        ...packages.map(pk=>`<label class="signup-course-check"><input type="checkbox" name="su-course" value="PKG:${esc(pk.id)}" /><div><div style="font-weight:600;font-size:13px">📦 ${esc(pk.name)}</div><div style="font-size:11px;color:#5a7a9f">Package · ${pk.courses?pk.courses.length+" courses":""}</div></div></label>`)
      ].join("");

  return `<div id="login-page">
    <div class="login-grid-bg"></div>
    <div class="login-box" id="login-box" style="width:min(560px,calc(100vw - 40px))">
      <div class="login-brand">
        <div class="big-brand">LearnWithMe</div>
        <div class="sub">Create Your Account</div>
      </div>
      <div class="login-mode-switch">
        <button class="login-mode-btn" onclick="_loginMode='login';render()">Sign In</button>
        <button class="login-mode-btn active" onclick="_loginMode='signup';render()">Sign Up</button>
      </div>
      <div class="grid2">
        <div class="field"><label class="field-label">Full Name *</label><input class="inp" id="su-name" placeholder="e.g. Jane Banda" /></div>
        <div class="field"><label class="field-label">NRC Number *</label><input class="inp" id="su-nrc" placeholder="e.g. 123456/10/1" /></div>
      </div>
      <div class="grid2">
        <div class="field"><label class="field-label">Email Address *</label><input class="inp" id="su-email" type="email" placeholder="jane@example.com" /></div>
        <div class="field"><label class="field-label">Phone Number</label><input class="inp" id="su-phone" placeholder="+260 97 000 0000" /></div>
      </div>
      <div class="field"><label class="field-label">Desired Password *</label>
        <div class="pw-eye-wrap"><input class="inp" id="su-pwd" type="password" placeholder="Min 6 characters" /><button class="pw-eye-btn" type="button" onclick="togglePwEye('su-pwd',this)">👁</button></div>
      </div>
      <div class="field">
        <label class="field-label">Applying For (select courses or packages)</label>
        <div style="max-height:180px;overflow-y:auto;border:1px solid #1e2f4a;border-radius:8px;padding:10px;background:#141f33">
          ${courseChecks}
        </div>
      </div>
      <div class="field"><label class="field-label">Additional Notes (optional)</label><textarea class="inp" id="su-notes" rows="2" placeholder="Any additional information…"></textarea></div>
      <button class="login-btn" id="su-submit-btn" onclick="submitSignup()">📨 Submit Application</button>
      <div id="su-err" style="display:none" class="login-err"></div>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:#5a7a9f">Already have an account? <a onclick="_loginMode='login';render()" style="color:#3d8ef0;cursor:pointer;font-weight:600">Sign In</a></div>
    </div>
  </div>`;
}

window.switchLoginRole = function(role) {
  _loginRole = role; render();
};

function bindLogin() {
  // In signup mode, the submit button uses onclick directly — just bind Enter on the form
  if(_loginMode==="signup"){
    const nameEl=document.getElementById("su-name");
    if(nameEl) nameEl.addEventListener("keydown",e=>{if(e.key==="Enter")submitSignup();});
    return;
  }

  const attempt=()=>{
    const u=document.getElementById("login-u").value.trim();
    const p=document.getElementById("login-p").value;
    const err=document.getElementById("login-err");
    const susp=document.getElementById("login-suspended");
    const pend=document.getElementById("login-pending");
    [err,susp,pend].forEach(el=>{if(el)el.style.display="none";});

    let success=false;

    if(_loginRole==="superadmin"){
      const savedPwd=(STATE.data.settings&&STATE.data.settings.adminPassword)||SUPER_ADMIN.password;
      if(u===SUPER_ADMIN.username && p===savedPwd){
        STATE.loggedIn=true; STATE.adminUser=u; STATE.userRole="superadmin"; STATE.navHistory=[]; _loginMode="login"; success=true;
        update(d=>{logActivity(d,`<b>${esc(u)}</b> signed in as <b>superadmin</b>`,COLORS.emerald);});
      }
    } else {
      const roleMap={admin:"Admin",instructor:"Instructor",student:"Student"};
      const expectedRole=roleMap[_loginRole];
      const found=(STATE.data.users||[]).find(x=>
        (x.name===u||x.email===u) && x.role===expectedRole && x.status==="Active" && x.password===p
      );
      if(found){
        STATE.loggedIn=true; STATE.adminUser=found.name; STATE.userRole=_loginRole; STATE.navHistory=[]; _loginMode="login"; success=true;
        update(d=>{logActivity(d,`<b>${esc(found.name)}</b> signed in as <b>${_loginRole}</b>`,COLORS.emerald);});
      }
    }

    if(!success){
      const roleMap2={admin:"Admin",instructor:"Instructor",student:"Student"};
      const matchedUser=_loginRole!=="superadmin"?(STATE.data.users||[]).find(x=>(x.name===u||x.email===u)&&x.role===roleMap2[_loginRole]):null;
      const box=document.getElementById("login-box");
      if(matchedUser&&matchedUser.status==="Suspended"){
        if(susp){susp.style.display="block";susp.style.background="#f07a3d18";susp.style.borderColor="#f07a3d44";susp.style.color="#f07a3d";}
      } else if(matchedUser&&matchedUser.status==="Pending"){
        if(pend){pend.style.display="block";pend.style.background="#f0c93d18";pend.style.borderColor="#f0c93d44";pend.style.color="#f0c93d";}
      } else {
        if(err){err.style.display="block";err.textContent=_loginRole==="superadmin"?"Invalid username or password":"Invalid credentials. Contact your administrator.";}
      }
      if(box){box.style.animation="shake .5s ease";setTimeout(()=>{box.style.animation="none";},500);}
      setTimeout(()=>{[err,susp,pend].forEach(el=>{if(el)el.style.display="none";});},5000);
    }
  };
  const loginBtn=document.getElementById("login-btn");
  const loginP=document.getElementById("login-p");
  if(loginBtn) loginBtn.addEventListener("click",attempt);
  if(loginP) loginP.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();});
}

window.showForgotPassword = function(){
  const role=_loginRole;
  if(role==="superadmin"){
    openModal("Forgot Password",`<div style="text-align:center;padding:10px 0 20px"><div style="font-size:40px;margin-bottom:14px">&#128081;</div><div style="font-weight:700;font-size:15px;margin-bottom:8px">Super Admin Password</div><div style="font-size:13px;color:#5a7a9f;line-height:1.8">The Super Admin password can only be changed from within the system after logging in. If you cannot log in, please restore from a backup or contact your system administrator.</div></div><div class="flex-end"><button class="btn btn-surface" onclick="closeModal()">Close</button></div>`);
    return;
  }
  openModal("Forgot Password — "+role.charAt(0).toUpperCase()+role.slice(1),`
    <div style="font-size:13px;color:#5a7a9f;line-height:1.8;margin-bottom:18px">
      Enter your username or email to submit a password reset request.

window.submitForgotPassword = function(role){
  const identity=document.getElementById("fp-identity").value.trim();
  const note=document.getElementById("fp-note").value.trim();
  if(!identity){toast("Please enter your username or email","error");return;}
  const roleMap={admin:"Admin",instructor:"Instructor",student:"Student"};
  const user=(STATE.data.users||[]).find(u=>(u.name===identity||u.email===identity)&&u.role===roleMap[role]);
  if(!user){toast("No account found with that name or email","error");return;}
  update(d=>{
    if(!d.passwordResets)d.passwordResets=[];
    d.passwordResets=(d.passwordResets||[]).filter(r=>r.userId!==user.id||r.status!=="Pending");
    d.passwordResets.unshift({id:uid(),userId:user.id,userName:user.name,userEmail:user.email,userRole:user.role,note,status:"Pending",requestedAt:new Date().toISOString()});
    logActivity(d,`Password reset requested by <b>${esc(user.name)}</b> (${user.role})`,COLORS.gold);
  });
  closeModal(); toast("Reset request submitted! An administrator will reset your password shortly.","success");
};

window.submitSignup = function(){
  const name=document.getElementById("su-name")?.value.trim();
  const nrc=document.getElementById("su-nrc")?.value.trim();
  const email=document.getElementById("su-email")?.value.trim();
  const phone=document.getElementById("su-phone")?.value.trim();
  const pwd=document.getElementById("su-pwd")?.value;
  const notes=document.getElementById("su-notes")?.value.trim();
  const errEl=document.getElementById("su-err");

  function showErr(msg){if(errEl){errEl.textContent=msg;errEl.style.display="block";}}
  if(!name){showErr("Full name is required.");return;}
  if(!nrc){showErr("NRC number is required.");return;}
  if(!email){showErr("Email address is required.");return;}
  if(!pwd||pwd.length<6){showErr("Password must be at least 6 characters.");return;}

  // Check duplicate email
  const dup=(STATE.data.users||[]).find(u=>u.email===email);
  if(dup){showErr("An account with this email already exists.");return;}
  const dupReq=(STATE.data.signupRequests||[]).find(r=>r.email===email&&r.status==="Pending");
  if(dupReq){showErr("A signup request with this email is already pending approval.");return;}

  // Gather selected courses/packages
  const checked=[...document.querySelectorAll("input[name='su-course']:checked")].map(cb=>cb.value);

  update(d=>{
    if(!d.signupRequests)d.signupRequests=[];
    d.signupRequests.unshift({
      id:uid(), name, nrc, email, phone, password:pwd,
      appliedFor:checked, notes,
      status:"Pending", submittedAt:new Date().toISOString()
    });
    logActivity(d,`New signup application from <b>${esc(name)}</b> (${esc(email)})`,COLORS.gold);
  });

  // Show success, switch back to login
  _loginMode="login";
  render();
  toast("Application submitted! Please wait for admin approval before logging in.","success");
};

function bindBottomNav() {
  // Primary buttons
  document.querySelectorAll("#bottom-nav .bn-btn[data-page]").forEach(btn=>{
    btn.addEventListener("click",()=>{ closeMoreMenu(); navigate(btn.dataset.page); });
  });
  // More menu items
  document.querySelectorAll("#bottom-nav .bn-more-item[data-page]").forEach(item=>{
    item.addEventListener("click",()=>{ closeMoreMenu(); navigate(item.dataset.page); });
  });
  // More toggle
  const moreBtn = document.getElementById("bn-more-btn");
  if(moreBtn) moreBtn.addEventListener("click",()=>{
    const menu = document.getElementById("bn-more-menu");
    if(menu) menu.classList.toggle("open");
  });
  // Close more menu on outside click — persistent listener with proper guard
  document.addEventListener("click", e=>{
    if(!e.target.closest("#bottom-nav")) closeMoreMenu();
  });
}
function closeMoreMenu() {
  const menu = document.getElementById("bn-more-menu");
  if(menu) menu.classList.remove("open");
}

  // Student

  const myAssignments=allContent.filter(c=>c.type==="assignment"&&c.status==="Published");
  const overdueA=myAssignments.filter(a=>a.dueDate&&new Date(a.dueDate)<now);
  const dueSoonA=myAssignments.filter(a=>{if(!a.dueDate)return false;const diff=(new Date(a.dueDate)-now)/86400000;return diff>=0&&diff<=3;});
  const completed=myEnrollments.filter(e=>e.status==="Completed").length;
  const newContent=allContent.filter(c=>c.status==="Published"&&c.createdAt&&(now-new Date(c.createdAt))<604800000).length;

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
      <div class="section-card">
        <div class="section-card-header"><span class="section-card-title">📢 Announcements</span><button class="btn btn-sm btn-surface" onclick="navigate('mylearning')">All →</button></div>
        ${!myAnnouncements.length?emptyState("📢","No announcements yet"):myAnnouncements.map(a=>`<div class="announce-card" onclick="viewContentItem('${a.id}')" style="cursor:pointer"><div style="font-weight:700;font-size:13px;margin-bottom:4px">${esc(a.title)}</div><div style="font-size:12px;color:#5a7a9f;line-height:1.6">${esc((a.description||a.content||"").slice(0,120))}${(a.description||a.content||"").length>120?"…":""}</div><div style="font-size:10px;color:#5a7a9f;margin-top:6px">By ${esc(a.instructor)} · ${esc(a.createdAt?a.createdAt.slice(0,10):"")}</div></div>`).join("")}
      </div>
      <div class="section-card">
        <div class="section-card-header"><span class="section-card-title">My Courses</span><button class="btn btn-sm btn-surface" onclick="navigate('mylearning')">View All →</button></div>
        ${!myEnrollments.length?emptyState("📚","Not enrolled yet"):myEnrollments.slice(0,4).map(e=>{const prog=e.progress||0;return`<div class="recent-item"><div class="recent-icon" style="background:#1a273d;border-radius:8px">📖</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${esc(e.course)}</div><div class="prog-track" style="width:100%;margin-top:5px"><div class="prog-fill" style="width:${prog}%;background:${prog>=100?COLORS.emerald:COLORS.accent}"></div></div><div style="font-size:10px;color:#5a7a9f;margin-top:3px">${prog}% complete</div></div>${chipHTML(e.status||"Active")}</div>`;}).join("")}

}
function statCard(label,value,icon,color,sub) {

    <div class="stat-value stat-value-anim" style="color:${color}">${value}</div>

}
function emptyState(icon,msg) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div style="font-size:14px">${msg}</div></div>`;
}
function sectionCard(title,action,body) {
  return `<div class="section-card">

function renderUsers(q="") {
  if(STATE.userRole==="instructor"||STATE.userRole==="student") return `<div><div class="page-header"><h1 class="page-title">Users</h1><div class="page-desc">You do not have permission to manage users.</div></div></div>`;
  const users=(STATE.data.users||[]).filter(u=>!q||[u.name,u.email,u.role,u.status].join(" ").toLowerCase().includes(q.toLowerCase()));
  const pendingResets=(STATE.data.passwordResets||[]).filter(r=>r.status==="Pending");
  const rows=users.map(u=>{
    const isSuspended=u.status==="Suspended";
    const hasReset=pendingResets.some(r=>r.userId===u.id);
    const canSuspend=(STATE.userRole==="superadmin")||(STATE.userRole==="admin"&&(u.role==="Instructor"||u.role==="Student"));
    const canReset=(STATE.userRole==="superadmin")||(STATE.userRole==="admin"&&(u.role==="Instructor"||u.role==="Student"));
    return `<tr style="${isSuspended?"opacity:.65;background:#f05a5a08":""}">
      <td><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><b>${esc(u.name)}</b>
        ${hasReset?`<span style="background:${COLORS.gold};color:#080d17;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;cursor:pointer" onclick="openResetRequestModal('${u.id}')">🔑 Reset Pending</span>`:""}
        ${isSuspended?`<span style="background:${COLORS.rose}22;color:${COLORS.rose};border:1px solid ${COLORS.rose}44;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700">SUSPENDED</span>`:""}
      </div></td>
      <td style="color:#5a7a9f">${esc(u.email)}</td>
      <td>${chipHTML(u.role)}</td>
      <td>${chipHTML(u.status)}</td>
      <td style="color:#5a7a9f;font-size:12px;font-family:'DM Mono',monospace">${esc(u.nrc||"—")}</td>
      <td style="color:#5a7a9f;font-size:12px">${esc(u.phone||"—")}</td>
      <td style="color:#5a7a9f;font-size:12px">${esc(u.joined||"—")}</td>
      <td><div class="flex-row">
        <button class="btn btn-sm btn-surface" onclick="editUser('${u.id}')">✏️</button>
        ${canSuspend?`<button class="btn btn-sm ${isSuspended?"btn-emerald":"btn-gold"}" onclick="toggleSuspendUser('${u.id}')">${isSuspended?"✓ Reinstate":"⛔ Suspend"}</button>`:""}
        ${canReset?`<button class="btn btn-sm btn-surface" onclick="adminResetPassword('${u.id}')" title="Reset Password">🔑</button>`:""}
        <button class="btn btn-sm btn-rose" onclick="delUser('${u.id}')">🗑</button>
      </div></td>
    </tr>`;
  }).join("");

  const pendingResetCount=pendingResets.filter(r=>STATE.userRole==="superadmin"||(r.userRole==="Instructor"||r.userRole==="Student")).length;
  const pendingSignups=(STATE.data.signupRequests||[]).filter(r=>r.status==="Pending").length;
  return `<div>
    <div class="page-header"><h1 class="page-title">Users</h1><div class="page-desc">Manage registered learners and instructors</div></div>
    ${pendingSignups?`<div class="suspended-banner" style="border-color:#f0c93d44;background:#f0c93d08;margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><div style="font-weight:700;color:${COLORS.gold};font-size:14px">📝 ${pendingSignups} Sign-up Application${pendingSignups>1?"s":""} Pending</div><div style="font-size:12px;color:#5a7a9f;margin-top:3px">New students are waiting for account approval</div></div><button class="btn btn-gold btn-sm" onclick="navigate('signups')">Review Applications →</button></div></div>`:""}
    ${pendingResetCount?`<div class="suspended-banner" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><div style="font-weight:700;color:${COLORS.gold};font-size:14px">&#128273; ${pendingResetCount} Password Reset Request${pendingResetCount>1?"s":""} Pending</div><div style="font-size:12px;color:#5a7a9f;margin-top:3px">Users are waiting for their passwords to be reset</div></div><button class="btn btn-gold btn-sm" onclick="navigate('passwordresets')">Review Requests &#8594;</button></div></div>`:""}    <div class="section-card">
      <div class="section-card-header">
        <span class="section-card-title">All Users (${users.length})</span>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <input class="inp search-bar" id="users-q" placeholder="Search users…" value="${esc(q)}" />
          <button class="btn" onclick="addUser()">＋ Add User</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>NRC</th><th>Phone</th><th>Joined</th><th style="min-width:220px">Actions</th></tr></thead>
          <tbody>${rows||`<tr><td colspan="8">${emptyState("👤","No users yet.")}</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}
function bindPage(page) {
  if(page==="users") {
    const q=document.getElementById("users-q");
    if(q) q.addEventListener("input",()=>{ document.getElementById("page-main").innerHTML=renderUsers(q.value); bindPage("users"); });
  }
  if(page==="courses") {
    const q=document.getElementById("courses-q");
    if(q) q.addEventListener("input",()=>{ document.getElementById("page-main").innerHTML=renderCourses(q.value); bindPage("courses"); });
  }
  if(page==="payments") {
    const q=document.getElementById("payments-q");
    if(q) q.addEventListener("input",()=>{ document.getElementById("page-main").innerHTML=renderPayments(q.value); bindPage("payments"); });
  }
  if(page==="enrollments") {
    const q=document.getElementById("enrollments-q");
    if(q) q.addEventListener("input",()=>{ document.getElementById("page-main").innerHTML=renderEnrollments(q.value); bindPage("enrollments"); });
  }
}

window.addUser=function() { openUserModal(null); };
window.editUser=function(id) {
  const u=(STATE.data.users||[]).find(x=>x.id===id);
  if(u) openUserModal(u);
};
window.delUser=function(id) {
  const u=(STATE.data.users||[]).find(x=>x.id===id);
  if(!u||!confirm(`Delete user "${u.name}"?`)) return;
  update(d=>{d.users=d.users.filter(x=>x.id!==id);logActivity(d,`User <b>${esc(u.name)}</b> deleted`,COLORS.rose);});
  toast("User deleted","error");
};

function openUserModal(u) {
  const editing=u?u.id:null;
  const availableRoles = STATE.userRole==="superadmin" ? ["Student","Instructor","Admin"] : ["Student","Instructor"];
  openModal(editing?"Edit User":"Add New User",`
    <div class="field"><label class="field-label">Full Name</label><input class="inp" id="uf-name" placeholder="e.g. Jane Doe" value="${esc(u?u.name:"")}" /></div>
    <div class="grid2">

      <div class="field"><label class="field-label">NRC Number</label><input class="inp" id="uf-nrc" placeholder="e.g. 123456/10/1" value="${esc(u?u.nrc||"":"")}" /></div>
    </div>
    <div class="field"><label class="field-label">Phone (optional)</label><input class="inp" id="uf-phone" placeholder="+260 97 000 0000" value="${esc(u?u.phone||"":"")}" /></div>
    <div class="grid2">
      <div class="field"><label class="field-label">Role</label>
        <select class="inp" id="uf-role">${availableRoles.map(r=>`<option${u&&u.role===r?" selected":!u&&r==="Student"?" selected":""} value="${r}">${r}</option>`).join("")}</select>
      </div>
      <div class="field"><label class="field-label">Status</label>
        <select class="inp" id="uf-status">${["Active","Inactive","Pending","Suspended"].map(s=>`<option${u&&u.status===s?" selected":!u&&s==="Active"?" selected":""} value="${s}">${s}</option>`).join("")}</select>
      </div>

    <div class="field">
      <label class="field-label">${editing?"New Password (leave blank to keep current)":"Login Password"}</label>
      <input class="inp" id="uf-password" type="password" placeholder="${editing?"Leave blank to keep existing password":"Set a password for this user"}" autocomplete="new-password" />
      <div style="font-size:11px;color:#5a7a9f;margin-top:5px">Users log in with their Full Name (or Email) + this password</div>
    </div>
    <div class="field"><label class="field-label">Notes (optional)</label><textarea class="inp" id="uf-notes" rows="2" placeholder="Internal notes…">${esc(u?u.notes||"":"")}</textarea></div>
    <div class="flex-end">
      <button class="btn btn-surface" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveUser('${editing||""}')">Save User</button>
    </div>`);
}
window.saveUser=function(editing) {
  const name=document.getElementById("uf-name").value.trim();
  const email=document.getElementById("uf-email").value.trim();
  if(!name||!email){toast("Name and email are required","error");return;}
  const pwdInput=document.getElementById("uf-password").value;
  if(!editing&&!pwdInput){toast("A password is required for new users","error");return;}
  const nrcEl=document.getElementById("uf-nrc");
  const form={name,email,phone:document.getElementById("uf-phone").value,nrc:nrcEl?nrcEl.value.trim():"",role:document.getElementById("uf-role").value,status:document.getElementById("uf-status").value,notes:document.getElementById("uf-notes").value};
  if(pwdInput) form.password=pwdInput;
  update(d=>{
    if(editing){
      const i=d.users.findIndex(u=>u.id===editing);
      if(i>=0) d.users[i]={...d.users[i],...form};
      logActivity(d,`User <b>${esc(name)}</b> updated`);
    } else {
      d.users.push({id:uid(),...form,joined:today(),createdAt:new Date().toISOString()});
      logActivity(d,`New user <b>${esc(name)}</b> added (${form.role})`,COLORS.emerald);
    }
  });
  closeModal(); toast("User saved!","success");
};

window.saveCourse=function(editing){

    else{d.payments.push({id:uid(),...form,date:today(),createdAt:new Date().toISOString()});logActivity(d,`Payment <b>${fmtMoney(amount)}</b> recorded — ${esc(user)} / ${esc(course)}`,COLORS.emerald);}
  });

window.approvePayment=function(id){
  const p=(STATE.data.payments||[]).find(x=>x.id===id);
  if(!p)return;
  if(!confirm(`Approve payment of ${fmtMoney(p.amount)} for ${p.user}?\nThis will auto-enroll them and send a receipt email.`))return;
  update(d=>{
    const i=d.payments.findIndex(x=>x.id===id);
    if(i>=0){ d.payments[i].status="Completed"; d.payments[i].approvedAt=new Date().toISOString(); }
    // Auto-enroll student
    if(!d.enrollments) d.enrollments=[];
    const courseOrPkg=p.package||p.course;
    const alreadyEnrolled=d.enrollments.find(e=>e.user===p.user&&e.course===courseOrPkg);
    if(!alreadyEnrolled) d.enrollments.push({id:uid(),user:p.user,course:courseOrPkg,status:"Active",progress:0,enrolledDate:today(),createdAt:new Date().toISOString(),paymentId:id});
    logActivity(d,`Payment approved for <b>${esc(p.user)}</b> — ${esc(courseOrPkg)} — ${fmtMoney(p.amount)}`,COLORS.emerald);
  });
  // Send receipt email
  sendReceiptEmail(id);
  toast("Payment approved! Student auto-enrolled. Receipt email triggered.","success");
};

/* ══════════════════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════════════════ */
function renderAnalytics() {
  const {users=[],courses=[],payments=[],enrollments=[]}=STATE.data;
  const isInstructor = STATE.userRole === "instructor";
  const totalRev=payments.filter(p=>p.status==="Completed").reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const avgPrice=courses.length?courses.reduce((s,c)=>s+parseFloat(c.price||0),0)/courses.length:0;
  const completedE=enrollments.filter(e=>e.status==="Completed").length;
  const compRate=enrollments.length?Math.round(completedE/enrollments.length*100):0;

  const catCounts=courses.reduce((acc,c)=>{acc[c.category]=(acc[c.category]||0)+1;return acc;},{});
  const roleCounts=users.reduce((acc,u)=>{acc[u.role]=(acc[u.role]||0)+1;return acc;},{});
  const methodCounts=payments.reduce((acc,p)=>{acc[p.method]=(acc[p.method]||0)+1;return acc;},{});

  function barsHTML(obj,color) {
    if(!Object.keys(obj).length) return emptyState("📊","No data yet");
    const max=Math.max(...Object.values(obj));
    return Object.entries(obj).map(([k,v])=>`
      <div class="bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span>${esc(k)}</span><span style="color:#5a7a9f;font-weight:600">${v}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${max>0?Math.round(v/max*100):0}%;background:${color}"></div></div>
      </div>`).join("");
  }

  return `<div>
    <div class="page-header"><h1 class="page-title">Analytics</h1><div class="page-desc">Platform performance overview</div></div>
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
      ${isInstructor?"":statCard("Total Revenue",fmtMoney(totalRev),"💰",COLORS.emerald,"")}
      ${isInstructor?"":statCard("Avg Course Price",fmtMoney(avgPrice),"🏷️",COLORS.gold,"")}
      ${statCard("Completion Rate",compRate+"%","🏆",COLORS.accent,"")}
      ${statCard("Active Enrollments",enrollments.filter(e=>e.status==="Active").length,"📖","#c084fc","")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
      ${sectionCard("Courses by Category","",barsHTML(catCounts,COLORS.accent))}
      ${isInstructor?"":sectionCard("Users by Role","",barsHTML(roleCounts,COLORS.gold))}
      ${isInstructor?"":sectionCard("Payment Methods","",!Object.keys(methodCounts).length?emptyState("💳","Record payments to see breakdown"):barsHTML(methodCounts,COLORS.emerald))}
      ${sectionCard("Course Price Distribution","",!courses.length?emptyState("🏷️","Add courses to see data"):
        courses.slice(0,8).map(c=>{const max=Math.max(...courses.map(x=>x.price||0),1);return`
          <div class="bar-wrap">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span>${esc(c.title.length>28?c.title.slice(0,28)+"…":c.title)}</span><span style="color:#5a7a9f;font-weight:600">${fmtMoney(c.price||0)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round((c.price||0)/max*100)}%;background:#c084fc"></div></div>
          </div>`;}).join("")
      )}
    </div>
  </div>`;
}

window.saveFirebaseConfig=function(){
  const raw = document.getElementById("fb-paste-box").value.trim();
  if(!raw || raw.startsWith("//")) { toast("Please paste your Firebase config first","error"); return; }
  // Extract key:value pairs from the pasted firebaseConfig block
  const config = {};
  const keys = ["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId","databaseURL","measurementId"];
  keys.forEach(k=>{
    const match = raw.match(new RegExp(k+'\\s*:\\s*["\']([^"\']+)["\']'));
    if(match) config[k] = match[1];
  });
  if(!config.apiKey || !config.projectId){
    toast("Could not find apiKey or projectId — make sure you pasted the full firebaseConfig block","error");
    return;
  }
  update(d=>{
    d.settings={...d.settings,firebaseConfig:config};
    logActivity(d,"Firebase sync configuration saved by Super Admin",COLORS.gold);
  });
  toast("Firebase config saved! All devices will now sync automatically.","success");
};
window.clearFirebaseConfig=function(){
  if(!confirm("Remove Firebase configuration? App will revert to local-only mode."))return;
  update(d=>{ const s={...d.settings}; delete s.firebaseConfig; d.settings=s; logActivity(d,"Firebase config removed",COLORS.rose); });

};

function sendReceiptEmail(paymentId){
  const p=(STATE.data.payments||[]).find(x=>x.id===paymentId);
  if(!p) return;
  const student=(STATE.data.users||[]).find(u=>u.name===p.user);
  const email=student&&student.email;
  if(!email){ toast("No email address on file for this student — add their email in Users first","info"); return; }
  const platform=(STATE.data.settings&&STATE.data.settings.platformName)||"LearnWithMe";
  const cur=getCurrencySymbol();
  const idx=(STATE.data.payments||[]).findIndex(x=>x.id===paymentId);
  const receiptNo=String(idx+1).padStart(4,"0");
  const ec=getEmailJS();
  if(!ec){ toast("EmailJS not configured — go to Settings → Email Receipts to set it up","info"); return; }
  emailjs.send(ec.serviceId, ec.templateId, {
    to_email:email,
    student_name:p.user,
    course_name:p.course||p.package||"—",
    amount:cur+parseFloat(p.amount||0).toFixed(2),
    receipt_no:receiptNo,
    payment_method:p.method||"—",
    reference:p.reference||"—",
    platform_name:platform,
    from_name:ec.fromName||platform,
  }).then(()=>{
    toast(`✅ Receipt emailed to ${email}`,"success");
    update(d=>{logActivity(d,`Receipt emailed to <b>${esc(email)}</b> for payment #${receiptNo}`,COLORS.emerald);});
  }).catch(err=>{
    toast("Email failed: "+((err&&err.text)||"Check your EmailJS settings"),"error");
  });
}

  const email=pr.studentEmail;
  if(!email){ toast("No email address submitted — student did not provide an email","info"); return; }

window.exportJSON=function(){
  const blob=new Blob([JSON.stringify({...STATE.data,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`learnwithme-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  update(d=>{logActivity(d,"Data exported to JSON backup",COLORS.gold);});
  toast("Data exported!","success");
};
window.importJSON=function(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!confirm(`Import ${(parsed.users||[]).length} users, ${(parsed.courses||[]).length} courses, ${(parsed.payments||[]).length} payments? Current data will be replaced.`))return;
      update(d=>{
        d.users=parsed.users||[]; d.courses=parsed.courses||[];
        d.packages=parsed.packages||[]; d.payments=parsed.payments||[];
        d.enrollments=parsed.enrollments||[]; d.proofSubmissions=parsed.proofSubmissions||[];
        d.academicPeriods=parsed.academicPeriods||[];
        d.signupRequests=parsed.signupRequests||[];
        d.passwordResets=parsed.passwordResets||[];
        d.content=parsed.content||[];
        if(parsed.settings)d.settings={...d.settings,...parsed.settings};
        logActivity(d,"Data imported from backup file",COLORS.emerald);
      });
      toast("Data imported!","success");
    }catch{toast("Invalid file — could not parse JSON","error");}
  };
  reader.readAsText(file); e.target.value="";
};
window.clearAllData=function(){
  if(!confirm("⚠️ DELETE ALL data — users, courses, payments, enrollments? This cannot be undone."))return;
  if(!confirm("Final confirmation: wipe everything?"))return;
  update(d=>{d.users=[];d.courses=[];d.packages=[];d.payments=[];d.enrollments=[];d.proofSubmissions=[];d.academicPeriods=[];d.signupRequests=[];d.passwordResets=[];d.content=[];logActivity(d,"⚠️ All platform data wiped by Super Admin",COLORS.rose);});
  toast("All data cleared","error");
};

window.printReport = function(type) {
  const {users=[],courses=[],payments=[],enrollments=[],activity=[]}=STATE.data;
  const cur = getCurrencySymbol();
  const revenue = payments.filter(p=>p.status==="Completed").reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const platform = (STATE.data.settings&&STATE.data.settings.platformName)||"LearnWithMe";
  const now = new Date().toLocaleString();

  const printStyles = `
    <style>
      body{font-family:Arial,sans-serif;color:#111;background:#fff;padding:24px;font-size:13px}
      h1{font-size:22px;margin-bottom:4px} h2{font-size:16px;margin:18px 0 10px}
      .meta{color:#666;font-size:12px;margin-bottom:20px}
      table{width:100%;border-collapse:collapse;margin-bottom:20px}
      th{background:#f4f4f4;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #ddd}
      td{padding:8px 10px;border-bottom:1px solid #eee}
      .stat-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
      .stat-box{border:1px solid #ddd;border-radius:6px;padding:14px 20px;min-width:130px;text-align:center}
      .stat-num{font-size:28px;font-weight:700;color:#1a3a6b}
      .stat-lbl{font-size:11px;color:#666;text-transform:uppercase;margin-top:4px}
      @media print{button{display:none}}
    </style>`;

  let body = "";
  const header = `<h1>📚 ${platform}</h1><div class="meta">Generated: ${now} &nbsp;|&nbsp; By: ${STATE.adminUser} (${STATE.userRole})</div>`;

  if(type==="summary") {
    const students=users.filter(u=>u.role==="Student").length;
    const instructors=users.filter(u=>u.role==="Instructor").length;
    const admins=users.filter(u=>u.role==="Admin").length;
    body = `${header}<h2>Platform Summary</h2>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${students}</div><div class="stat-lbl">Students</div></div>
        <div class="stat-box"><div class="stat-num">${instructors}</div><div class="stat-lbl">Instructors</div></div>
        <div class="stat-box"><div class="stat-num">${admins}</div><div class="stat-lbl">Admins</div></div>
        <div class="stat-box"><div class="stat-num">${courses.length}</div><div class="stat-lbl">Courses</div></div>
        <div class="stat-box"><div class="stat-num">${enrollments.length}</div><div class="stat-lbl">Enrollments</div></div>
        <div class="stat-box"><div class="stat-num">${cur}${revenue.toFixed(2)}</div><div class="stat-lbl">Revenue</div></div>
        <div class="stat-box"><div class="stat-num">${payments.filter(p=>p.status==="Pending").length}</div><div class="stat-lbl">Pending Pmts</div></div>
      </div>`;
  } else if(type==="users") {
    body = `${header}<h2>All Users (${users.length})</h2>
      <table><thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Phone</th><th>Joined</th></tr></thead><tbody>
      ${users.map((u,i)=>`<tr><td>${i+1}</td><td>${u.name||""}</td><td>${u.email||""}</td><td>${u.role||""}</td><td>${u.status||""}</td><td>${u.phone||"—"}</td><td>${u.joined||"—"}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="payments") {
    body = `${header}<h2>All Payments (${payments.length})</h2>
      <table><thead><tr><th>#</th><th>Student</th><th>Course</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th></tr></thead><tbody>
      ${payments.map((p,i)=>`<tr><td>${i+1}</td><td>${p.user||""}</td><td>${p.course||p.package||""}</td><td>${cur}${parseFloat(p.amount||0).toFixed(2)}</td><td>${p.method||"—"}</td><td>${p.status||""}</td><td>${p.date||"—"}</td></tr>`).join("")}
      </tbody></table>
      <p><b>Total Completed Revenue: ${cur}${revenue.toFixed(2)}</b></p>`;
  } else if(type==="enrollments") {
    body = `${header}<h2>All Enrollments (${enrollments.length})</h2>
      <table><thead><tr><th>#</th><th>Student</th><th>Course</th><th>Date</th><th>Status</th></tr></thead><tbody>
      ${enrollments.map((e,i)=>`<tr><td>${i+1}</td><td>${e.user||""}</td><td>${e.course||""}</td><td>${e.enrolledDate||e.date||"—"}</td><td>${e.status||"Active"}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="courses") {
    body = `${header}<h2>All Courses (${courses.length})</h2>
      <table><thead><tr><th>#</th><th>Title</th><th>Category</th><th>Instructor</th><th>Level</th><th>Price</th><th>Status</th></tr></thead><tbody>
      ${courses.map((c,i)=>`<tr><td>${i+1}</td><td>${c.title||""}</td><td>${c.category||""}</td><td>${c.instructor||"—"}</td><td>${c.level||"—"}</td><td>${c.price>0?cur+parseFloat(c.price).toFixed(2):"Free"}</td><td>${c.status||""}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="coursework") {
    const cw=(STATE.data.content||[]).filter(c=>c.type==="coursework");
    body = `${header}<h2>Coursework Results</h2>`;
    if(!cw.length){ body+=`<p>No coursework results recorded.</p>`; }
    else { cw.forEach(c=>{
      const rows=(c.studentMarks||[]).map(m=>{const g=eczGrade(m.pct);return`<tr><td>${m.name}</td><td>${m.raw}</td><td>${c.marks||100}</td><td>${m.pct}%</td><td>Grade ${g.grade} — ${g.label}</td></tr>`;}).join("");
      body+=`<h3 style="margin:18px 0 6px">${c.title} (${c.subject||"—"}) — By ${c.instructor}</h3>
        <table><thead><tr><th>Student</th><th>Marks</th><th>Max</th><th>%</th><th>Grade</th></tr></thead><tbody>${rows||"<tr><td colspan=5>No marks</td></tr>"}</tbody></table>`;
    }); }
  } else if(type==="content") {
    const ci=STATE.data.content||[];
    body = `${header}<h2>Classroom Content (${ci.length})</h2>
      <table><thead><tr><th>#</th><th>Title</th><th>Type</th><th>Subject</th><th>Instructor</th><th>Status</th><th>Due Date</th><th>Posted</th></tr></thead><tbody>
      ${ci.map((c,i)=>`<tr><td>${i+1}</td><td>${c.title||""}</td><td>${c.type||""}</td><td>${c.subject||"—"}</td><td>${c.instructor||"—"}</td><td>${c.status||""}</td><td>${c.dueDate||"—"}</td><td>${c.createdAt?c.createdAt.slice(0,10):"—"}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="proofs") {
    const ps=STATE.data.proofSubmissions||[];
    body = `${header}<h2>Proof of Payment Submissions (${ps.length})</h2>
      <table><thead><tr><th>#</th><th>Student</th><th>Item</th><th>Amount</th><th>Method</th><th>Reference</th><th>Status</th><th>Submitted</th></tr></thead><tbody>
      ${ps.map((p,i)=>`<tr><td>${i+1}</td><td>${p.studentName||""}</td><td>${p.itemName||""}</td><td>${cur}${parseFloat(p.amount||0).toFixed(2)}</td><td>${p.method||"—"}</td><td>${p.reference||"—"}</td><td>${p.status||""}</td><td>${p.submittedAt?p.submittedAt.slice(0,10):"—"}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="activity") {
    const ac=STATE.data.activity||[];
    body = `${header}<h2>Activity Log (${ac.length} entries)</h2>
      <table><thead><tr><th>#</th><th>Activity</th><th>Time</th></tr></thead><tbody>
      ${ac.map((a,i)=>`<tr><td>${i+1}</td><td>${(a.msg||"").replace(/<[^>]+>/g,"")}</td><td>${a.ts?new Date(a.ts).toLocaleString():"—"}</td></tr>`).join("")}
      </tbody></table>`;
  } else if(type==="receipts") {
    body = `${header}<h2>All Payment Receipts</h2>` +
      payments.map((p,i)=>`
        <div style="border:1px solid #ddd;border-radius:6px;padding:16px;margin-bottom:16px;page-break-inside:avoid">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px">
            <b style="font-size:15px">Receipt #${String(i+1).padStart(4,"0")}</b>
            <span style="color:#666;font-size:12px">${p.date||"—"}</span>
          </div>
          <table style="margin:0"><tbody>
            <tr><td style="width:140px;color:#666;border:none;padding:4px 0">Student</td><td style="border:none;padding:4px 0"><b>${p.user||"—"}</b></td></tr>
            <tr><td style="color:#666;border:none;padding:4px 0">Course</td><td style="border:none;padding:4px 0">${p.course||p.package||"—"}</td></tr>
            <tr><td style="color:#666;border:none;padding:4px 0">Amount</td><td style="border:none;padding:4px 0"><b>${cur}${parseFloat(p.amount||0).toFixed(2)}</b></td></tr>
            <tr><td style="color:#666;border:none;padding:4px 0">Method</td><td style="border:none;padding:4px 0">${p.method||"—"}</td></tr>
            <tr><td style="color:#666;border:none;padding:4px 0">Status</td><td style="border:none;padding:4px 0">${p.status||"—"}</td></tr>
          </tbody></table>
        </div>`).join("");
  }

  const win = window.open("","_blank","width=900,height=700");
  win.document.write(`<!DOCTYPE html><html><head><title>${platform} — ${type}</title>${printStyles}</head><body>${body}<br/><button onclick="window.print()">🖨️ Print / Save as PDF</button></body></html>`);
  win.document.close();
};

window.printReceipt = function(id) {
  const p = (STATE.data.payments||[]).find(x=>x.id===id);
  if(!p){ toast("Receipt not found","error"); return; }
  const platform = (STATE.data.settings&&STATE.data.settings.platformName)||"LearnWithMe";
  const cur = getCurrencySymbol();
  const idx = (STATE.data.payments||[]).indexOf(p);
  const win = window.open("","_blank","width=600,height=500");
  win.document.write(`<!DOCTYPE html><html><head><title>Receipt</title>
    <style>body{font-family:Arial,sans-serif;padding:40px;max-width:500px;margin:auto;color:#111}
    h1{font-size:20px;text-align:center;margin-bottom:4px}.sub{text-align:center;color:#666;font-size:12px;margin-bottom:28px}
    .row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eee;font-size:14px}
    .total{font-size:17px;font-weight:700}.footer{text-align:center;color:#999;font-size:11px;margin-top:28px}
    @media print{button{display:none}}</style></head>
    <body>
    <h1>📚 ${platform}</h1>
    <div class="sub">Official Payment Receipt</div>

    else{d.academicPeriods.push({id:uid(),...form,created:today()});logActivity(d,`Academic period <b>${esc(name)}</b> created`,COLORS.gold);}
  });

window.promoteStudents=function(periodId){
  const period=(STATE.data.academicPeriods||[]).find(x=>x.id===periodId);
  if(!period){toast("Period not found","error");return;}
  if(!period.nextPeriodId){toast("No next period set — edit this period and set the Next Period first","error");return;}
  const nextPeriod=(STATE.data.academicPeriods||[]).find(x=>x.id===period.nextPeriodId);
  if(!nextPeriod){toast("Next period not found","error");return;}
  const activeEnrollments=(STATE.data.enrollments||[]).filter(e=>e.periodId===periodId&&e.status==="Active");
  if(!activeEnrollments.length){toast("No active students in this period to promote","info");return;}
  if(!confirm(`Promote ${activeEnrollments.length} active students from "${period.name}" to "${nextPeriod.name}"?`))return;
  update(d=>{
    let promoted=0;
    activeEnrollments.forEach(e=>{
      const already=(d.enrollments||[]).find(x=>x.user===e.user&&x.periodId===period.nextPeriodId);
      if(!already){
        d.enrollments.push({id:uid(),user:e.user,course:e.course,status:"Active",progress:0,periodId:period.nextPeriodId,promotedFrom:periodId,enrolledDate:today(),createdAt:new Date().toISOString()});
        promoted++;
      }
    });
    logActivity(d,`<b>${promoted}</b> students promoted from <b>${esc(period.name)}</b> to <b>${esc(nextPeriod.name)}</b>`,COLORS.emerald);
  });
  toast(`Students promoted to ${nextPeriod.name}!`,"success");
};
